<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry Topic 2 — Practice Test</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f1a;--surface:#111827;--surface2:#1a2235;--border:#1f2d45;--border2:#2d3f5c;
  --text:#e4eaf4;--muted:#6b7fa0;--muted2:#3a4d6a;
  --accent:#4ade80;--accent-bg:rgba(74,222,128,0.08);--accent-bd:rgba(74,222,128,0.28);
  --green:#34d399;--green-bg:rgba(52,211,153,0.09);--green-bd:rgba(52,211,153,0.32);
  --red:#f87171;--red-bg:rgba(248,113,113,0.09);--red-bd:rgba(248,113,113,0.32);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,0.09);--yellow-bd:rgba(251,191,36,0.32);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.09);--purple-bd:rgba(167,139,250,0.32);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:1rem;flex-wrap:wrap;}
.hdr-l{display:flex;align-items:center;gap:0.75rem;}
.dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
.hdr-title{font-weight:800;font-size:0.9rem;}
.hdr-sub{font-size:0.72rem;color:var(--muted);margin-top:0.1rem;}
.hdr-r{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;}
.score-pill{font-family:'Fira Code',monospace;font-size:0.75rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:0.3em 0.9em;}
.score-pill span{color:var(--accent);}
.prog-wrap{padding:0 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);}
.prog-track{height:3px;background:var(--border);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#22c55e);transition:width 0.4s ease;width:0%;}
.wrap{max-width:800px;margin:0 auto;padding:2rem 1.5rem 5rem;}
.sec-hdr{display:flex;align-items:center;gap:0.75rem;margin:2.5rem 0 1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.sec-badge{font-family:'Fira Code',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:100px;padding:0.25em 0.8em;}
.sec-title{font-size:0.95rem;font-weight:700;color:var(--text);}
.sec-count{font-size:0.75rem;color:var(--muted);margin-left:auto;font-family:'Fira Code',monospace;}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem;transition:border-color 0.2s;}
.q-card.answered-ok{border-color:var(--green-bd);}
.q-card.answered-bad{border-color:var(--red-bd);}
.q-meta{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.75rem;}
.q-num{font-family:'Fira Code',monospace;font-size:0.65rem;color:var(--muted2);letter-spacing:0.1em;}
.q-type-badge{font-size:0.62rem;font-family:'Fira Code',monospace;padding:0.2em 0.65em;border-radius:100px;border:1px solid;}
.q-type-badge.mcq{color:var(--purple);border-color:var(--purple-bd);background:var(--purple-bg);}
.q-type-badge.short{color:var(--yellow);border-color:var(--yellow-bd);background:var(--yellow-bg);}
.q-text{font-size:0.97rem;font-weight:600;line-height:1.55;margin-bottom:1.1rem;}
.opts{display:flex;flex-direction:column;gap:0.45rem;}
.opt{padding:0.7rem 1rem;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:0.87rem;color:var(--muted);transition:all 0.14s;display:flex;align-items:flex-start;gap:0.7rem;line-height:1.5;}
.opt:hover:not(.locked){border-color:var(--border2);color:var(--text);}
.opt.chosen{border-color:rgba(167,139,250,0.5);background:rgba(167,139,250,0.1);color:var(--text);}
.opt.correct{border-color:var(--green-bd);background:var(--green-bg);color:var(--green);}
.opt.wrong{border-color:var(--red-bd);background:var(--red-bg);color:var(--red);}
.opt-letter{font-family:'Fira Code',monospace;font-size:0.72rem;font-weight:500;flex-shrink:0;margin-top:0.1rem;}
.short-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;line-height:1.6;resize:vertical;min-height:80px;transition:border-color 0.15s;}
.short-input:focus{outline:none;border-color:var(--accent);}
.short-input::placeholder{color:var(--muted2);}
.short-btns{display:flex;gap:0.5rem;margin-top:0.6rem;flex-wrap:wrap;}
.btn-reveal{padding:0.45em 1.1em;border-radius:8px;border:1px solid var(--accent-bd);background:var(--accent-bg);color:var(--accent);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-reveal:hover{background:rgba(74,222,128,0.16);}
.btn-self-ok{padding:0.45em 1em;border-radius:8px;border:1px solid var(--green-bd);background:var(--green-bg);color:var(--green);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;display:none;}
.btn-self-bad{padding:0.45em 1em;border-radius:8px;border:1px solid var(--red-bd);background:var(--red-bg);color:var(--red);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;display:none;}
.feedback{margin-top:0.9rem;padding:0.8rem 1rem;border-radius:10px;font-size:0.84rem;line-height:1.6;display:none;border:1px solid;}
.feedback.show{display:block;}
.feedback.ok{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
.feedback.bad{background:var(--red-bg);border-color:var(--red-bd);color:var(--red);}
.feedback.reveal{background:var(--yellow-bg);border-color:var(--yellow-bd);color:var(--yellow);}
.filter-bar{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.5rem;}
.filter-btn{padding:0.35em 0.9em;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Fira Code',monospace;font-size:0.68rem;cursor:pointer;transition:all 0.15s;letter-spacing:0.05em;}
.filter-btn:hover,.filter-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.submit-row{display:flex;justify-content:center;margin:2.5rem 0 1rem;}
.btn-submit{padding:0.8em 2.5em;border-radius:12px;border:none;background:var(--accent);color:#000;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;transition:all 0.15s;letter-spacing:-0.01em;}
.btn-submit:hover{opacity:0.9;transform:translateY(-1px);}
.results{display:none;background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:2.5rem;text-align:center;margin-top:2rem;}
.results.show{display:block;}
.res-big{font-size:4rem;font-weight:800;color:var(--accent);line-height:1;letter-spacing:-0.03em;}
.res-sub{font-size:1rem;color:var(--muted);margin-top:0.5rem;margin-bottom:2rem;}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:2rem;}
.res-cell{background:var(--surface2);border-radius:10px;padding:1rem;border:1px solid var(--border);}
.res-cell-val{font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;}
.res-cell-lbl{font-size:0.75rem;color:var(--muted);margin-top:0.2rem;font-family:'Fira Code',monospace;}
.btn-retry{padding:0.65em 2em;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;}
.btn-retry:hover{border-color:var(--accent);color:var(--accent);}
.hidden{display:none;}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <div class="dot"></div>
    <div>
      <div class="hdr-title">Chemistry Topic 2 — Practice Test</div>
      <div class="hdr-sub">Combining Atoms &nbsp;·&nbsp; 62 questions</div>
    </div>
  </div>
  <div class="hdr-r">
    <div class="score-pill">MCQ: <span id="mcqDisp">0/51</span></div>
    <div class="score-pill">Short: <span id="shortDisp">0/11</span></div>
  </div>
</header>
<div class="prog-wrap"><div class="prog-track"><div class="prog-fill" id="progFill"></div></div></div>

<div class="wrap">
  <div class="filter-bar" id="filterBar"></div>
  <div id="questionsWrap"></div>
  <div class="submit-row"><button class="btn-submit" onclick="submitAll()">Mark test</button></div>
  <div class="results" id="results">
    <div class="res-big" id="resBig"></div>
    <div class="res-sub" id="resSub"></div>
    <div class="res-grid">
      <div class="res-cell"><div class="res-cell-val" id="rMcq" style="color:var(--green)"></div><div class="res-cell-lbl">MCQ correct</div></div>
      <div class="res-cell"><div class="res-cell-val" id="rShort" style="color:var(--yellow)"></div><div class="res-cell-lbl">Short answered</div></div>
      <div class="res-cell"><div class="res-cell-val" id="rPct" style="color:var(--accent)"></div><div class="res-cell-lbl">MCQ score</div></div>
    </div>
    <button class="btn-retry" onclick="retryTest()">Reset &amp; retry</button>
  </div>
</div>

<script>
const questions=[{"section": "2.1 Types of Materials", "type": "mcq", "q": "Which type of solid is formed exclusively between metal atoms?", "opts": ["Ionic solid", "Covalent molecular solid", "Metallic solid", "Covalent network solid"], "ans": 2, "exp": "Metallic solids are formed from the interaction of metal atoms only. The structure consists of positive metal cations surrounded by a sea of delocalised electrons."}, {"section": "2.1 Types of Materials", "type": "mcq", "q": "Sodium chloride (NaCl) is best classified as:", "opts": ["A covalent molecular solid", "A metallic solid", "An ionic solid", "A covalent network solid"], "ans": 2, "exp": "NaCl forms from the electrostatic attraction between Na+ cations and Cl- anions in a 3D ionic lattice. It forms between a metallic and a non-metallic element."}, {"section": "2.1 Types of Materials", "type": "mcq", "q": "Which type of solid has discrete molecules interacting via intermolecular forces?", "opts": ["Metallic", "Ionic", "Covalent network", "Covalent molecular"], "ans": 3, "exp": "Covalent molecular solids (e.g. iodine, sucrose) consist of discrete molecules. The molecules interact with adjacent molecules via weak intermolecular forces, giving them relatively low melting points."}, {"section": "2.1 Types of Materials", "type": "mcq", "q": "Rank these solids from HIGHEST to LOWEST melting point: diamond (covalent network), NaCl (ionic), iodine (covalent molecular), copper (metallic).", "opts": ["Diamond > Copper > NaCl > Iodine", "Copper > Diamond > NaCl > Iodine", "Diamond > NaCl > Copper > Iodine", "NaCl > Diamond > Copper > Iodine"], "ans": 0, "exp": "Covalent networks have the strongest bonds (very high mp ~3500C for diamond) > Metallic (high, ~1085C for copper) > Ionic (moderate-high, ~801C for NaCl) > Covalent molecular (low, ~114C for iodine)."}, {"section": "2.1 Types of Materials", "type": "mcq", "q": "Which material conducts electricity in SOLID form?", "opts": ["Sodium chloride (NaCl)", "Silicon dioxide (SiO2)", "Copper (Cu)", "Iodine (I2)"], "ans": 2, "exp": "Metallic solids like copper conduct in solid form because delocalised electrons are free to move even when solid. Ionic solids only conduct when molten or dissolved; covalent solids generally do not conduct."}, {"section": "2.1 Types of Materials", "type": "mcq", "q": "Molten NaCl conducts electricity but solid NaCl does not. Why?", "opts": ["Melting creates new electrons", "When molten, ions are no longer locked in fixed positions and are free to move and carry charge", "NaCl becomes a metal when molten", "Melting changes NaCl into a covalent compound"], "ans": 1, "exp": "In solid NaCl, ions are fixed in the lattice - they cannot move to carry charge. When molten, the ionic bonds are broken and ions can flow freely, allowing electrical conduction."}, {"section": "2.1 Types of Materials", "type": "mcq", "q": "Graphite is a covalent network solid that conducts electricity. Why is this exceptional?", "opts": ["Graphite contains metal impurities", "Each carbon in graphite has a delocalised fourth electron that moves freely between layers", "Graphite's layered structure creates ionic bonds", "Carbon forms metallic bonds in graphite"], "ans": 1, "exp": "In graphite, each carbon bonds to only three adjacent atoms. The fourth valence electron is delocalised and free to move between graphite layers - giving it excellent electrical conductivity, unlike most covalent networks."}, {"section": "2.1 Types of Materials", "type": "short", "q": "Complete the conductivity table for the four solid types. For each type, state whether it conducts in: (a) solid form, (b) molten form, and (c) aqueous solution. Explain your reasoning for ionic solids.", "ans": "Metallic: solid YES, molten YES, aqueous N/A. Ionic: solid NO (ions fixed), molten YES (ions free), aqueous YES (ions free). Covalent network: solid NO (exception: graphite), molten NO, aqueous N/A. Covalent molecular: solid NO, molten NO, aqueous NO. Ionic reasoning: in solid form ions are locked in the lattice and cannot carry charge. When molten or dissolved, ions are released and free to move, allowing electrical conduction."}, {"section": "2.2 Octet Rule & Ion Formation", "type": "mcq", "q": "Why do noble gases rarely form chemical bonds?", "opts": ["They are too heavy", "They already possess a complete octet (8 valence electrons) and are stable", "They have no protons", "They are found only at high temperatures"], "ans": 1, "exp": "Noble gases (Group VIII) already have a full octet in their atomic form - they are uniquely stable with zero charge when unbonded. They have no tendency to gain, lose, or share electrons."}, {"section": "2.2 Octet Rule & Ion Formation", "type": "mcq", "q": "A Group II element forms an ion by:", "opts": ["Gaining 2 electrons to form a 2- ion", "Losing 2 electrons to form a 2+ cation", "Sharing 2 electrons", "Losing 1 electron to form a 1+ ion"], "ans": 1, "exp": "Group II elements have 2 valence electrons. Losing both achieves a noble gas configuration, forming a 2+ cation. Examples: Mg2+, Ca2+, Ba2+."}, {"section": "2.2 Octet Rule & Ion Formation", "type": "mcq", "q": "A Group VI non-metal forms an ion by:", "opts": ["Losing 6 electrons", "Gaining 2 electrons to form a 2- anion", "Losing 2 electrons", "Gaining 6 electrons"], "ans": 1, "exp": "Group VI elements have 6 valence electrons and need 2 more to complete their octet. They gain 2 electrons to form a 2- anion. Examples: O2-, S2-."}, {"section": "2.2 Octet Rule & Ion Formation", "type": "mcq", "q": "Ionisation energy increases across a period because:", "opts": ["Atomic radius increases across a period", "Greater nuclear charge and smaller atomic radius make it harder to remove electrons", "More electron shells are added", "Electrons are further from the nucleus"], "ans": 1, "exp": "Moving left to right: more protons increase nuclear charge, and electrons are in the same shell so atomic radius decreases. Both effects mean electrons are held more tightly - requiring more energy to remove (higher ionisation energy)."}, {"section": "2.2 Octet Rule & Ion Formation", "type": "mcq", "q": "The naming convention for anions changes the element suffix to:", "opts": ["-ite", "-ate", "-ide", "-ous"], "ans": 2, "exp": "Anions are named by replacing the elemental suffix with '-ide'. Examples: chlorine -> chloride, oxygen -> oxide, nitrogen -> nitride, sulfur -> sulfide."}, {"section": "2.2 Octet Rule & Ion Formation", "type": "short", "q": "Using the octet rule, predict the ion formed by: (a) aluminium (Group III), (b) sulfur (Group VI), (c) fluorine (Group VII). Write the ion symbol and explain why each forms that particular charge.", "ans": "(a) Al3+: Aluminium has 3 valence electrons. Losing all 3 achieves a noble gas configuration - forms Al3+ cation. (b) S2-: Sulfur has 6 valence electrons. Gaining 2 completes its octet - forms S2- anion. (c) F-: Fluorine has 7 valence electrons. Gaining 1 completes its octet - forms F- anion. Each ion achieves 8 valence electrons (noble gas configuration)."}, {"section": "2.2 Bond Energy", "type": "mcq", "q": "Which statement about bond formation is always true?", "opts": ["Bond formation always requires energy", "Bond formation always releases energy", "Bond formation is endothermic", "Bond formation has no energy change"], "ans": 1, "exp": "Bond formation ALWAYS releases energy as atoms reach a lower, more stable energy state. Bond breaking always requires energy. Whether the overall reaction is exo- or endothermic depends on the net energy change."}, {"section": "2.2 Bond Energy", "type": "mcq", "q": "In an EXOTHERMIC reaction:", "opts": ["Products have higher enthalpy than reactants", "Energy released forming new bonds < energy required breaking old bonds", "Energy released forming new bonds > energy required breaking old bonds", "No activation energy is needed"], "ans": 2, "exp": "Exothermic: energy released (bond formation) > energy required (bond breaking). Products sit at LOWER enthalpy than reactants. Excess energy is released to surroundings as heat."}, {"section": "2.2 Bond Energy", "type": "mcq", "q": "The reaction Na -> Na+ + e- has dH = +496 kJ/mol. This is:", "opts": ["Exothermic - energy is released", "Endothermic - energy is absorbed", "Neutral - no energy change", "Spontaneous at all temperatures"], "ans": 1, "exp": "Positive dH means the products have HIGHER energy than the reactants - energy is absorbed from surroundings. This is endothermic. Removing an electron from sodium requires energy input to overcome the attraction between the electron and nucleus."}, {"section": "2.2 Bond Energy", "type": "mcq", "q": "What is activation energy?", "opts": ["The total energy released in a reaction", "The energy difference between products and reactants", "The minimum energy required to start a chemical reaction by breaking existing bonds", "The energy of the fastest-moving particles"], "ans": 2, "exp": "Activation energy (Ea) is the minimum energy that must be provided to initiate a reaction. Even exothermic reactions need Ea to break existing bonds before new, more stable bonds can form. Measured in J/mol."}, {"section": "2.2 Bond Energy", "type": "short", "q": "Draw and describe the energy profile diagram for an exothermic reaction. Label: reactants, products, activation energy, and energy released. State where the dH is negative.", "ans": "The energy profile starts at a high point (reactants), rises to a peak (transition state = activation energy above reactants), then falls to a lower final point (products). Activation energy (Ea) = height from reactants to peak. Energy released = height from peak down to products. Products sit LOWER than reactants - this energy difference is the heat released. dH is negative (products lower than reactants) for exothermic reactions."}, {"section": "2.2 Metallic Bonding", "type": "mcq", "q": "What holds a metallic lattice together?", "opts": ["Covalent bonds between metal atoms", "Ionic bonds between cations and anions", "Electrostatic attraction between positive metal cations and delocalised electrons", "Hydrogen bonds between metal layers"], "ans": 2, "exp": "Metallic bonding: the strong electrostatic attraction between the lattice of positive metal cations and the sea of delocalised electrons. Although cations repel each other, delocalised electrons act as the binding glue."}, {"section": "2.2 Metallic Bonding", "type": "mcq", "q": "Why are metals malleable but ionic crystals are brittle?", "opts": ["Metals have weaker bonds", "In metals, layers of cations can slide past each other while delocalised electrons maintain attraction; in ionic crystals, shifting layers aligns like charges causing repulsion and shattering", "Ionic crystals have no bonds", "Metals contain more electrons overall"], "ans": 1, "exp": "In metals, when layers slide, the delocalised electron sea adjusts and maintains the attraction - bonds do not break. In ionic crystals, when layers shift, like-charged ions (+ with +, - with -) end up next to each other, creating repulsion that shatters the crystal."}, {"section": "2.2 Metallic Bonding", "type": "mcq", "q": "Why do metals conduct electricity?", "opts": ["Metal cations carry charge", "Delocalised electrons are free to move toward a positive electrode, constituting an electric current", "Metal atoms collide and transfer electrons one at a time", "Metallic bonds break and reform rapidly"], "ans": 1, "exp": "Delocalised electrons are not bound to individual atoms. In an electric field they flow toward the positive electrode and away from the negative electrode - this movement of charge IS an electric current."}, {"section": "2.2 Metallic Bonding", "type": "mcq", "q": "Aluminium (Group III, Al3+) has a higher melting point than magnesium (Group II, Mg2+) despite being in the same period. Why?", "opts": ["Aluminium has more electrons", "Al3+ has a greater charge magnitude than Mg2+, creating stronger electrostatic attraction to delocalised electrons, requiring more energy to melt", "Magnesium has a larger atomic radius giving stronger bonding", "Aluminium is denser"], "ans": 1, "exp": "Two factors: (1) Al3+ has greater charge than Mg2+ - stronger attraction to delocalised electrons. (2) Al has a smaller atomic radius than Mg (radius decreases left to right), so nuclei are closer to the electron sea, further strengthening the bond. Both increase Al's melting point."}, {"section": "2.2 Metallic Bonding", "type": "mcq", "q": "Why are alloys harder than pure metals?", "opts": ["Alloys have more electrons", "Different-sized atoms distort the regular lattice, requiring greater force for layers to slide past each other", "Alloys form ionic bonds", "Alloys have lower melting points"], "ans": 1, "exp": "In a pure metal, atoms are uniform in size and layers slide relatively easily. In alloys, the presence of different-sized atoms distorts the regular lattice structure - layers are locked and require much greater force to move, increasing hardness."}, {"section": "2.2 Metallic Bonding", "type": "short", "q": "Using the metallic bonding model, explain each of these properties: (a) electrical conductivity, (b) thermal conductivity, (c) lustre.", "ans": "(a) Electrical: delocalised electrons are free to move - they flow toward a positive electrode, creating an electric current. (b) Thermal: when heated, delocalised electrons gain kinetic energy and vibrate more rapidly, causing more frequent collisions that rapidly distribute heat throughout the metal. (c) Lustre: delocalised electrons absorb photons from light and jump to higher energy levels. When they return to lower levels, they re-emit photons - this absorption and re-emission of light produces the shiny, reflective appearance."}, {"section": "2.2 Ionic Bonding", "type": "mcq", "q": "What are the two steps involved in forming an ionic bond?", "opts": ["Sharing electrons then forming a lattice", "Electron transfer forming oppositely charged ions, then electrostatic attraction between them forming the ionic bond", "Heating the metal then cooling it", "Dissolving the ions then evaporating"], "ans": 1, "exp": "Step 1: Electron transfer - metal loses electrons (cation forms) and non-metal gains them (anion forms). Step 2: Ionic bond - electrostatic attraction between the oppositely charged ions. This attraction releases energy."}, {"section": "2.2 Ionic Bonding", "type": "mcq", "q": "Why are ionic compounds hard but brittle?", "opts": ["They have weak ionic bonds", "Hard because strong 3D ionic lattice with electrostatic forces; brittle because stress shifts layers, aligning like charges which repel and shatter the crystal", "They have covalent and ionic bonds mixed", "They contain free electrons that cause cracking"], "ans": 1, "exp": "Hardness: the strong 3D electrostatic lattice resists deformation. Brittleness: unlike metals where layers can slide without bond-breaking, in ionic crystals shifting layers brings like-charges together (+ next to +), causing sudden repulsion and fracture along a smooth plane."}, {"section": "2.2 Ionic Bonding", "type": "mcq", "q": "MgSO4 solution conducts more electricity than NaCl solution at the same concentration. The best explanation is:", "opts": ["MgSO4 is more soluble", "Mg2+ and SO42- ions have double the charge of Na+ and Cl-, so they carry more current per ion", "MgSO4 releases more electrons", "MgSO4 has a higher melting point"], "ans": 1, "exp": "Current is carried by moving ions. Doubly charged ions (Mg2+ and SO42-) carry twice the charge per ion compared to singly charged ions (Na+ and Cl-). At the same concentration, the doubly charged ions produce approximately twice the current."}, {"section": "2.2 Ionic Bonding", "type": "short", "q": "Sodium reacts with chlorine to form sodium chloride. Describe the two steps of ionic bond formation using electron transfer diagrams in words: (a) what happens to sodium, (b) what happens to chlorine, (c) how the ionic bond forms.", "ans": "(a) Sodium (Group I, 2,8,1) has 1 valence electron. It loses this electron, becoming Na+ (2,8). Energy equal to the ionisation energy must be provided. (b) Chlorine (Group VII, 2,8,7) gains the electron released by sodium, becoming Cl- (2,8,8). This is exothermic - energy is released as the electron enters. (c) The oppositely charged Na+ and Cl- ions attract each other electrostatically, releasing energy and forming an ionic bond. Many such ion pairs arrange into a 3D lattice to minimise repulsion and maximise attraction."}, {"section": "2.2 Empirical Formulae", "type": "mcq", "q": "What is the empirical formula for magnesium oxide? (Mg2+, O2-)", "opts": ["MgO2", "Mg2O", "MgO", "Mg2O2"], "ans": 2, "exp": "Mg2+ and O2- have equal charge magnitudes (both 2). Ratio is 1:1, so the formula is MgO. The charges balance: 2+ and 2- = neutral."}, {"section": "2.2 Empirical Formulae", "type": "mcq", "q": "What is the empirical formula for aluminium chloride? (Al3+, Cl-)", "opts": ["AlCl", "AlCl2", "AlCl3", "Al3Cl"], "ans": 2, "exp": "Al3+ needs three Cl- to balance. LCM of 3 and 1 is 3. Need 1x Al3+ and 3x Cl-. Formula: AlCl3. Check: 3+ from Al, 3x(1-) from 3 Cl = neutral."}, {"section": "2.2 Empirical Formulae", "type": "mcq", "q": "What is the empirical formula for aluminium oxide? (Al3+, O2-)", "opts": ["AlO", "Al2O", "Al2O3", "AlO3"], "ans": 2, "exp": "Al3+ and O2-: LCM of 3 and 2 is 6. Need 2x Al3+ (gives 6+) and 3x O2- (gives 6-). Formula: Al2O3. Total charge: 6+ and 6- = neutral."}, {"section": "2.2 Empirical Formulae", "type": "mcq", "q": "What is the formula for iron(III) oxide? (Fe3+, O2-)", "opts": ["FeO", "Fe2O3", "Fe3O2", "FeO3"], "ans": 1, "exp": "Fe3+ and O2-: LCM of 3 and 2 is 6. Need 2x Fe3+ and 3x O2-. Formula: Fe2O3. The (III) tells you Fe is in the +3 oxidation state here."}, {"section": "2.2 Empirical Formulae", "type": "mcq", "q": "The formula for magnesium nitrate is:", "opts": ["MgNO3", "Mg(NO3)2", "Mg2NO3", "Mg2(NO3)3"], "ans": 1, "exp": "Mg2+ and NO3- (polyatomic ion). Charge of Mg2+ is 2+; NO3- is 1-. Need 2x NO3- to balance. Formula: Mg(NO3)2. Brackets are used because the subscript 2 applies to the whole NO3 group."}, {"section": "2.2 Empirical Formulae", "type": "mcq", "q": "What is the formula for aluminium sulfate? (Al3+, SO42-)", "opts": ["AlSO4", "Al2SO4", "Al2(SO4)3", "Al3(SO4)2"], "ans": 2, "exp": "Al3+ and SO42-: LCM of 3 and 2 is 6. Need 2x Al3+ and 3x SO42-. Formula: Al2(SO4)3. Brackets are essential for polyatomic ions with subscripts greater than 1."}, {"section": "2.2 Empirical Formulae", "type": "short", "q": "Write the empirical formula and explain your working for: (a) calcium fluoride (Ca2+, F-), (b) sodium carbonate (Na+, CO32-), (c) iron(II) sulfate (Fe2+, SO42-).", "ans": "(a) Ca2+ and F-: charges unequal. Need 2x F- to balance Ca2+. Formula: CaF2. (2+ from Ca, 2x 1- from F = neutral). (b) Na+ and CO32-: unequal charges. LCM=2. Need 2x Na+ and 1x CO32-. Formula: Na2CO3. (2x 1+ = 2+, 1x 2- = 2-, neutral). (c) Fe2+ and SO42-: equal charge magnitudes. Ratio 1:1. Formula: FeSO4. No brackets needed as subscript is 1."}, {"section": "2.2 Polyatomic Ions", "type": "mcq", "q": "What is a polyatomic ion?", "opts": ["An ion with a very large charge", "An ion composed of more than one atom carrying an overall charge", "A neutral molecule", "An isotope with extra neutrons"], "ans": 1, "exp": "Polyatomic ions are composed of more than one atom and carry an overall charge. Most are anions (e.g. SO42-, NO3-, CO32-). Notable cation exceptions: NH4+ (ammonium) and H3O+ (hydronium)."}, {"section": "2.2 Polyatomic Ions", "type": "mcq", "q": "Which of the following is the correct formula for the sulfate ion?", "opts": ["SO3-", "SO42-", "SO4-", "SO32-"], "ans": 1, "exp": "The sulfate anion has the formula SO42-. Do not confuse with sulfite (SO32-). The sulfate ion contains sulfur with 4 oxygen atoms and carries a 2- charge."}, {"section": "2.2 Polyatomic Ions", "type": "mcq", "q": "When writing a formula with a polyatomic ion subscript greater than 1, you must:", "opts": ["Write the polyatomic ion twice", "Enclose the polyatomic ion in brackets before adding the subscript", "Just add the subscript to the last element", "Write the charge as a superscript"], "ans": 1, "exp": "When a subscript greater than 1 applies to a polyatomic ion, the entire ion must be enclosed in parentheses first. For example: Mg(NO3)2 not MgNO32, which would imply 2 oxygen atoms not 2 nitrate groups."}, {"section": "2.2 Polyatomic Ions", "type": "short", "q": "Name and give the formula for five common polyatomic anions. Include their charges.", "ans": "Any five from: hydroxide OH-, nitrate NO3-, nitrite NO2-, sulfate SO42-, sulfite SO32-, carbonate CO32-, bicarbonate/hydrogen carbonate HCO3-, phosphate PO43-, acetate CH3COO-. The two common polyatomic cations are ammonium NH4+ and hydronium H3O+."}, {"section": "2.2 Covalent Bonding", "type": "mcq", "q": "A covalent bond forms between:", "opts": ["A metal and a non-metal", "Two metals", "Two non-metals that share a pair of electrons", "Positive and negative ions"], "ans": 2, "exp": "Covalent bonds form between non-metallic atoms that share valence electron pairs. Strong electrostatic attraction arises between the shared bonding electrons and the positive nuclei of both participating atoms."}, {"section": "2.2 Covalent Bonding", "type": "mcq", "q": "A triple bond contains:", "opts": ["1 pair of shared electrons", "2 pairs of shared electrons", "3 pairs of shared electrons", "6 pairs of shared electrons"], "ans": 2, "exp": "A triple bond involves three shared electron pairs (6 electrons total). It is the strongest type of covalent bond. Example: N2 (N triple bond N). More bonding pairs = stronger bond = more energy required to break."}, {"section": "2.2 Covalent Bonding", "type": "mcq", "q": "N2 requires extreme conditions (lightning or the Haber process) to react. Why?", "opts": ["Nitrogen is radioactive", "The triple bond in N2 is extremely strong - enormous energy is required to break it", "N2 is too light to react", "N2 has ionic character"], "ans": 1, "exp": "N2 has a triple covalent bond - three shared electron pairs. This is the strongest type of covalent bond, requiring a very large energy input to break. In nature, only lightning or volcanoes provide enough energy; industrially the Haber process uses high temperature and pressure."}, {"section": "2.2 Covalent Bonding", "type": "mcq", "q": "Which element is the central atom in a molecule of ammonia (NH3)?", "opts": ["Hydrogen", "Nitrogen", "Either H or N", "The molecule has no central atom"], "ans": 1, "exp": "The central atom has the highest covalence (can form the most bonds) and usually has the lowest electronegativity among the non-hydrogen atoms. Nitrogen can form 3 bonds and has lower electronegativity than it would relative to H. H can only ever form 1 bond and is never central."}, {"section": "2.2 Covalent Bonding", "type": "mcq", "q": "The seven homonuclear diatomic molecules that exist at room temperature are:", "opts": ["H2, N2, O2, F2, Cl2, Br2, I2", "H2, He2, N2, O2, F2, Cl2, Br2", "Na2, K2, O2, N2, F2, Cl2, I2", "H2, N2, O2, S2, F2, Cl2, Br2"], "ans": 0, "exp": "The seven homonuclear diatomic molecules are H2, N2, O2, F2, Cl2, Br2, and I2. A useful mnemonic: HOFBrINCl (Have Oranges For Breakfast? It Needs Chlorine!). All exist as diatomic molecules at room temperature."}, {"section": "2.2 Covalent Bonding", "type": "short", "q": "State the 7 steps for drawing a Lewis structure, then apply them to draw the Lewis structure for carbon dioxide (CO2).", "ans": "Steps: 1. Write formula. 2. Count total valence electrons. 3. Determine bonds needed. 4. Identify central atom (highest covalence, lowest EN). 5. Complete octets of outer atoms. 6. Place remaining electrons on central atom. 7. Check total electron count. CO2 application: 1. CO2. 2. C=4, O=6x2=12, total=16e-. 3. Each O needs 2 more, suggesting double bonds. 4. C is central (4 bonds possible, lower EN than O). 5. O=C=O with 2 lone pairs on each O. 6. C has no lone pairs. 7. 4 bonding pairs + 4 lone pairs = 16e-. Lewis structure: [lone pairs]O=C=O[lone pairs] with two double bonds."}, {"section": "2.2 Bond Polarity", "type": "mcq", "q": "A non-polar covalent bond forms when:", "opts": ["Two different non-metals bond", "The electronegativity difference between bonding atoms is zero or negligible", "One atom has a much higher electronegativity", "Electrons are fully transferred"], "ans": 1, "exp": "Non-polar bonds occur when atoms have the same or negligible electronegativity difference. Electrons are shared equally with no partial charges. Examples: Cl2 (identical atoms), or C-H bonds (difference of 0.4, treated as non-polar)."}, {"section": "2.2 Bond Polarity", "type": "mcq", "q": "In HCl, Cl has electronegativity 3.0 and H has 2.1. Which atom carries the partial negative charge?", "opts": ["Hydrogen - it has fewer electrons", "Chlorine - it attracts the shared electron pair more strongly", "Both atoms share the charge equally", "Neither - HCl is non-polar"], "ans": 1, "exp": "In a polar bond, the MORE electronegative atom attracts the shared electrons toward itself, gaining a partial negative charge (delta-). Cl (3.0) is more electronegative than H (2.1), so Cl carries delta- and H carries delta+."}, {"section": "2.2 Bond Polarity", "type": "mcq", "q": "As the electronegativity difference between two bonding atoms increases, the bond:", "opts": ["Becomes weaker", "Becomes more polar and takes on more ionic character", "Becomes a non-polar covalent bond", "Becomes shorter only"], "ans": 1, "exp": "Bond character exists on a spectrum: non-polar covalent (EN difference approx 0) -> polar covalent (moderate EN difference) -> ionic (large EN difference). Greater polarity means more ionic character - the bond electrons are increasingly concentrated on one atom."}, {"section": "2.2 Bond Polarity", "type": "mcq", "q": "Electron shielding DECREASES electronegativity because:", "opts": ["It increases atomic radius", "Inner electrons reduce the effective nuclear pull experienced by outer/bonding electrons", "It removes protons from the nucleus", "It creates more electron pairs"], "ans": 1, "exp": "Electron shielding: inner shell electrons partially block the nucleus's attraction from reaching outer electrons. This reduces the effective nuclear charge felt by bonding electrons, decreasing the atom's ability to attract them (lower electronegativity)."}, {"section": "2.2 Bond Polarity", "type": "short", "q": "Compare a non-polar covalent bond and a polar covalent bond. Include: definition, cause, examples, and notation used.", "ans": "Non-polar covalent bond: electrons shared equally between atoms of the same or very similar electronegativity. No partial charges or dipole. Example: Cl2 (identical atoms), C-H (EN difference 0.4). No special notation needed. Polar covalent bond: electrons shared unequally due to significant EN difference. The more electronegative atom gains partial negative charge (delta-); the other gets partial positive (delta+). Example: H-Cl - Cl is delta- (EN 3.0), H is delta+ (EN 2.1). Delta notation is used. The greater the EN difference, the greater the polarity and the more ionic character the bond has."}, {"section": "2.2 Covalent Networks", "type": "mcq", "q": "In diamond, each carbon atom bonds to:", "opts": ["Two adjacent carbon atoms", "Three adjacent carbon atoms", "Four adjacent carbon atoms", "Six adjacent carbon atoms"], "ans": 2, "exp": "In diamond, each carbon forms four covalent bonds in a tetrahedral arrangement with four adjacent carbon atoms. This creates an extremely strong 3D network in all directions - making diamond the hardest known natural substance."}, {"section": "2.2 Covalent Networks", "type": "mcq", "q": "How does graphite differ from diamond in its bonding?", "opts": ["Graphite has ionic bonds; diamond has covalent bonds", "In graphite each C bonds to three adjacent atoms; the fourth electron is delocalised between layers", "Graphite has metallic bonds", "Graphite atoms have fewer electrons than diamond atoms"], "ans": 1, "exp": "In graphite, each carbon bonds to THREE adjacent atoms (not four like diamond). The fourth valence electron is delocalised between the hexagonal layers. This gives graphite its electrical conductivity and allows layers to slide (making it soft and slippery)."}, {"section": "2.2 Covalent Networks", "type": "mcq", "q": "What is the empirical formula of silica (silicon dioxide)?", "opts": ["Si2O", "SiO", "SiO2", "Si2O3"], "ans": 2, "exp": "In silica, each silicon forms 4 covalent bonds with oxygen atoms, but each oxygen is shared between 2 silicon atoms. The ratio is 1 Si to 2 O. Empirical formula: (SiO2)n. Similar structure to diamond."}, {"section": "2.2 Covalent Networks", "type": "mcq", "q": "Why do covalent network solids have very high melting points?", "opts": ["They have strong ionic bonds throughout", "The entire solid is one continuous network of strong covalent bonds - enormous energy is needed to break enough bonds to disrupt the structure", "They have metallic character", "Their delocalised electrons provide extra stability"], "ans": 1, "exp": "In a covalent network, every atom is bonded to its neighbours with strong covalent bonds throughout the entire solid. There are no discrete molecules. To melt, countless covalent bonds must be broken simultaneously - requiring enormous thermal energy. Diamond melts at approximately 3500-4000 degrees C."}, {"section": "2.2 Covalent Networks", "type": "mcq", "q": "Silicon carbide (SiC) and boron carbide (B4C) are used in bulletproof vests because they are:", "opts": ["Flexible and lightweight", "Extremely hard covalent network solids resistant to mechanical stress", "Good electrical conductors", "Malleable like metals"], "ans": 1, "exp": "Silicon carbide and boron carbide are covalent network solids with extremely strong covalent bonds throughout. This makes them among the hardest materials known, able to withstand high mechanical stress without deforming - ideal for body armour and armoured vehicles."}, {"section": "2.2 Covalent Networks", "type": "short", "q": "Compare diamond and graphite as carbon allotropes. Address: bonding arrangement, electrical conductivity, hardness/softness, and give the empirical formula for both.", "ans": "Both are allotropes of carbon (same element, different structures, same physical state). Diamond: each C bonds to 4 adjacent C atoms (tetrahedral, all 4 valence electrons in bonds). No free electrons - electrical insulator. Hardest known substance. Empirical formula: (C)n. Graphite: each C bonds to 3 adjacent C atoms in hexagonal layers. Fourth electron is delocalised between layers - excellent electrical conductor. Soft and slippery (layers slide). Empirical formula: (C)n. Key difference: diamond's 4-bond arrangement vs graphite's 3-bond + delocalised electron arrangement."}, {"section": "2.2 Naming & Formulae", "type": "mcq", "q": "What is the systematic name for CO2?", "opts": ["Carbon oxide", "Monocarbon dioxide", "Carbon dioxide", "Dicarbon oxide"], "ans": 2, "exp": "CO2: C = 1 atom (mono- is omitted on the first atom), O = 2 atoms (di-). Second element gets '-ide'. Systematic name: carbon dioxide."}, {"section": "2.2 Naming & Formulae", "type": "mcq", "q": "What is the molecular formula for dinitrogen pentaoxide?", "opts": ["NO5", "N2O", "N2O5", "NO2"], "ans": 2, "exp": "Di- = 2, nitrogen = N, penta- = 5, oxide = O. Formula: N2O5."}, {"section": "2.2 Naming & Formulae", "type": "mcq", "q": "What is the systematic name for SF6?", "opts": ["Sulfur hexafluoride", "Sulfur fluoride", "Monosulfur fluoride", "Hexasulfur fluoride"], "ans": 0, "exp": "S = 1 atom (mono- omitted on first atom), F = 6 atoms (hexa-). Second element gets '-ide': fluoride. Name: sulfur hexafluoride."}, {"section": "2.2 Naming & Formulae", "type": "mcq", "q": "What is the difference between a molecular formula and an empirical formula?", "opts": ["They are the same thing", "Molecular formula gives the exact number of atoms in one molecule; empirical formula gives the simplest ratio", "Empirical formula only applies to gases", "Molecular formula is used only for ionic compounds"], "ans": 1, "exp": "Molecular formula: exact atom count in one discrete molecule (e.g. H2O2). Empirical formula: simplest ratio of atoms/ions (e.g. HO for hydrogen peroxide). Covalent molecules use molecular formulae; ionic compounds and covalent networks use empirical formulae."}, {"section": "2.2 Naming & Formulae", "type": "short", "q": "Name the following compounds and state whether each is a molecular formula or empirical formula: (a) N2O5, (b) (SiO2)n, (c) CCl4, (d) (C)n, (e) P4O10.", "ans": "(a) N2O5 - dinitrogen pentaoxide - molecular formula (discrete molecule with fixed atom count). (b) (SiO2)n - silicon dioxide / silica - empirical formula (covalent network, n represents repeating units). (c) CCl4 - carbon tetrachloride - molecular formula. (d) (C)n - carbon (diamond or graphite) - empirical formula (covalent network). (e) P4O10 - tetraphosphorus decaoxide - molecular formula."}];
const sections=["2.1 Types of Materials", "2.2 Octet Rule & Ion Formation", "2.2 Bond Energy", "2.2 Metallic Bonding", "2.2 Ionic Bonding", "2.2 Empirical Formulae", "2.2 Polyatomic Ions", "2.2 Covalent Bonding", "2.2 Bond Polarity", "2.2 Covalent Networks", "2.2 Naming & Formulae"];
let mcqAnswered={},shortRevealed={},shortSelfMark={};
let mcqCorrect=0,submitted=false;

function build(){
  const bar=document.getElementById('filterBar');
  bar.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='filter-btn on';allBtn.textContent='All sections';
  allBtn.onclick=()=>filterSec(null,allBtn);
  bar.appendChild(allBtn);
  sections.forEach(s=>{
    const b=document.createElement('button');b.className='filter-btn';b.textContent=s;
    b.onclick=()=>filterSec(s,b);bar.appendChild(b);
  });
  const wrap=document.getElementById('questionsWrap');wrap.innerHTML='';
  let secEl=null,curSec=null,qNum=0;
  questions.forEach((q,qi)=>{
    if(q.section!==curSec){
      curSec=q.section;secEl=document.createElement('div');
      secEl.className='sec-block';secEl.dataset.sec=q.section;
      const sh=document.createElement('div');sh.className='sec-hdr';
      const cnt=questions.filter(x=>x.section===q.section).length;
      sh.innerHTML='<span class="sec-badge">'+q.section+'</span><span class="sec-title"></span><span class="sec-count">'+cnt+' questions</span>';
      secEl.appendChild(sh);wrap.appendChild(secEl);
    }
    qNum++;
    const card=document.createElement('div');card.className='q-card';card.id='qcard-'+qi;
    const meta='<div class="q-meta"><span class="q-num">Q'+qNum+'</span><span class="q-type-badge '+q.type+'">'+(q.type==='mcq'?'MCQ':'Short answer')+'</span></div>';
    const qText='<div class="q-text">'+q.q+'</div>';
    let body='';
    if(q.type==='mcq'){
      const opts=q.opts.map((o,oi)=>'<div class="opt" id="opt'+qi+'_'+oi+'" onclick="chooseOpt('+qi+','+oi+')"><span class="opt-letter">'+['A','B','C','D'][oi]+'</span><span>'+o+'</span></div>').join('');
      body='<div class="opts">'+opts+'</div>';
    }else{
      body='<textarea class="short-input" id="shortTa'+qi+'" placeholder="Write your answer here..."></textarea><div class="short-btns"><button class="btn-reveal" onclick="revealShort('+qi+')">Show model answer</button><button class="btn-self-ok" id="selfok'+qi+'" onclick="selfMark('+qi+',true)">I got it</button><button class="btn-self-bad" id="selfbad'+qi+'" onclick="selfMark('+qi+',false)">Missed it</button></div>';
    }
    const fb='<div class="feedback" id="fb'+qi+'"></div>';
    card.innerHTML=meta+qText+body+fb;secEl.appendChild(card);
  });
}

function filterSec(sec,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.sec-block').forEach(b=>{b.style.display=(!sec||b.dataset.sec===sec)?'':'none';});
}

function chooseOpt(qi,oi){
  if(submitted)return;if(mcqAnswered[qi]!==undefined)return;
  document.querySelectorAll('#qcard-'+qi+' .opt').forEach(o=>o.classList.remove('chosen'));
  document.getElementById('opt'+qi+'_'+oi).classList.add('chosen');
  mcqAnswered[qi]=oi;updateProg();
}

function revealShort(qi){
  const q=questions[qi];const fb=document.getElementById('fb'+qi);
  fb.className='feedback show reveal';fb.textContent='Model answer: '+q.ans;
  shortRevealed[qi]=true;
  document.getElementById('selfok'+qi).style.display='inline-block';
  document.getElementById('selfbad'+qi).style.display='inline-block';updateProg();
}

function selfMark(qi,ok){
  if(shortSelfMark[qi]!==undefined)return;shortSelfMark[qi]=ok;
  const card=document.getElementById('qcard-'+qi);const fb=document.getElementById('fb'+qi);
  const q=questions[qi];
  if(ok){card.classList.add('answered-ok');fb.className='feedback show ok';fb.textContent='Marked correct. Model answer: '+q.ans;}
  else{card.classList.add('answered-bad');fb.className='feedback show bad';fb.textContent='Marked incorrect. Model answer: '+q.ans;}
  document.getElementById('selfok'+qi).style.display='none';document.getElementById('selfbad'+qi).style.display='none';
  document.getElementById('shortDisp').textContent=Object.keys(shortSelfMark).length+'/11';updateProg();
}

function updateProg(){
  const total=Object.keys(mcqAnswered).length+Object.keys(shortRevealed).length;
  document.getElementById('progFill').style.width=(total/questions.length*100)+'%';
}

function submitAll(){
  if(submitted)return;submitted=true;mcqCorrect=0;
  questions.forEach((q,qi)=>{
    if(q.type!=='mcq')return;
    const sel=mcqAnswered[qi];
    const opts=document.querySelectorAll('#qcard-'+qi+' .opt');
    opts.forEach(o=>o.classList.add('locked'));opts[q.ans].classList.add('correct');
    const fb=document.getElementById('fb'+qi);const card=document.getElementById('qcard-'+qi);
    if(sel===q.ans){mcqCorrect++;fb.className='feedback show ok';fb.textContent='Correct! '+q.exp;card.classList.add('answered-ok');}
    else{if(sel!==undefined)opts[sel].classList.add('wrong');fb.className='feedback show bad';fb.textContent=(sel===undefined?'Not answered. ':'Incorrect. ')+q.exp;card.classList.add('answered-bad');}
  });
  document.getElementById('mcqDisp').textContent=mcqCorrect+'/51';
  const pct=Math.round(mcqCorrect/51*100);
  const shortCount=Object.values(shortSelfMark).filter(v=>v).length;
  document.getElementById('rMcq').textContent=mcqCorrect+'/51';
  document.getElementById('rShort').textContent=shortCount+'/11';
  document.getElementById('rPct').textContent=pct+'%';
  document.getElementById('resBig').textContent=mcqCorrect+'/51';
  document.getElementById('resSub').textContent=pct>=80?'Excellent work! Strong understanding across all topics.':pct>=60?'Good effort - review the sections you found difficult.':'Keep revising - go back to the notes and try again.';
  const res=document.getElementById('results');res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});document.getElementById('progFill').style.width='100%';
}

function retryTest(){
  mcqAnswered={};shortRevealed={};shortSelfMark={};mcqCorrect=0;submitted=false;
  document.getElementById('results').classList.remove('show');
  document.getElementById('mcqDisp').textContent='0/51';
  document.getElementById('shortDisp').textContent='0/11';
  document.getElementById('progFill').style.width='0%';
  build();window.scrollTo({top:0,behavior:'smooth'});
}

build();
</script>
</body>
</html>
