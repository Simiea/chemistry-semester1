<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry Topics 1 & 2 — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c0f; --surface: #0e1318; --surface2: #131a22;
  --border: #1e2d3d; --border2: #253545;
  --text: #d8eaf4; --muted: #4e7a9a; --muted2: #2a4050;
  --accent: #38bdf8; --accent2: #0ea5e9;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans',sans-serif; min-height:100vh; overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse 60% 50% at 20% 30%, rgba(56,189,248,0.04) 0%, transparent 60%),
              radial-gradient(ellipse 40% 40% at 80% 70%, rgba(74,222,128,0.03) 0%, transparent 55%);
  pointer-events:none; z-index:0;
}
.hdr {
  position:sticky; top:0; z-index:100;
  background:rgba(8,12,15,0.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0.9rem 1.5rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;
}
.hdr-l { display:flex; align-items:center; gap:0.75rem; }
.logo-dot {
  width:10px; height:10px; border-radius:50%; background:var(--accent);
  box-shadow:0 0 14px var(--accent),0 0 28px rgba(56,189,248,0.4);
  animation:throb 2.5s ease-in-out infinite;
}
@keyframes throb {
  0%,100% { box-shadow:0 0 14px var(--accent),0 0 28px rgba(56,189,248,0.4); }
  50%      { box-shadow:0 0 20px var(--accent),0 0 40px rgba(56,189,248,0.6); }
}
.hdr-title { font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:800; letter-spacing:-0.01em; }
.hdr-sub   { font-size:0.72rem; color:var(--muted); margin-top:0.1rem; }
.hdr-r { display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; }
.counter-pill {
  font-family:'Fira Code',monospace; font-size:0.75rem; color:var(--muted);
  background:var(--surface2); border:1px solid var(--border2); border-radius:100px; padding:0.3em 0.9em;
}
.counter-pill .n { color:var(--accent); font-weight:500; }
.prog-wrap { background:var(--surface); border-bottom:1px solid var(--border); }
.prog-track { height:3px; background:var(--border); overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--accent2),#4ade80); width:0%; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); }
.topic-tabs { max-width:900px; margin:0 auto; padding:1rem 1.5rem 0; display:flex; gap:0.5rem; position:relative; z-index:1; }
.topic-tab {
  padding:0.45em 1.2em; border-radius:10px; border:1px solid var(--border2);
  background:transparent; color:var(--muted);
  font-family:'Plus Jakarta Sans',sans-serif; font-size:0.8rem; font-weight:700; cursor:pointer; transition:all 0.18s;
}
.topic-tab:hover { border-color:var(--accent); color:var(--accent); }
.topic-tab.on { background:rgba(56,189,248,0.12); border-color:var(--accent); color:var(--accent); }
.filter-wrap { max-width:900px; margin:0 auto; padding:0.75rem 1.5rem 0; position:relative; z-index:1; }
.filter-label { font-family:'Fira Code',monospace; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted2); margin-bottom:0.5rem; }
.filter-row { display:flex; gap:0.4rem; flex-wrap:wrap; }
.filt {
  padding:0.35em 0.85em; border-radius:100px; border:1px solid var(--border2); background:transparent;
  color:var(--muted); font-family:'Fira Code',monospace; font-size:0.65rem; cursor:pointer; transition:all 0.18s; letter-spacing:0.04em;
}
.filt:hover { border-color:var(--accent); color:var(--accent); }
.filt.on { background:rgba(56,189,248,0.1); border-color:var(--accent); color:var(--accent); font-weight:500; }
.deck-wrap { max-width:900px; margin:0 auto; padding:1.25rem 1.5rem 5rem; position:relative; z-index:1; }
.chapter-label {
  display:flex; align-items:center; gap:0.75rem; margin-bottom:1.1rem;
  opacity:0; transform:translateY(8px); animation:slideUp 0.4s ease forwards;
}
.ch-icon { font-size:1.3rem; }
.ch-badge { font-family:'Fira Code',monospace; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.22em 0.75em; border-radius:100px; border:1px solid; }
.ch-name { font-size:0.85rem; font-weight:700; }
.ch-progress { margin-left:auto; font-family:'Fira Code',monospace; font-size:0.7rem; color:var(--muted); }
.type-badge { font-family:'Fira Code',monospace; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.2em 0.65em; border-radius:100px; border:1px solid; }
.type-badge.mcq { color:#a78bfa; border-color:rgba(167,139,250,0.4); background:rgba(167,139,250,0.08); }
.type-badge.short { color:#fbbf24; border-color:rgba(251,191,36,0.4); background:rgba(251,191,36,0.08); }
.card-scene { width:100%; margin-bottom:1.1rem; cursor:pointer; user-select:none; perspective:1000px; }
.card-3d {
  border-radius:18px; min-height:300px; position:relative;
  transition:transform 0.55s cubic-bezier(0.4,0,0.2,1);
  transform-style:preserve-3d;
}
.card-face {
  border-radius:18px; display:flex; flex-direction:column;
  padding:1.75rem 2.25rem; border:1px solid var(--border2); min-height:300px;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  position:absolute; inset:0;
}
.card-front { background:var(--surface); z-index:2; justify-content:space-between; }
.card-back  { background:var(--surface2); transform:rotateY(180deg); justify-content:space-between; }
.card-3d.flipped { transform:rotateY(180deg); }
.card-front::before, .card-back::before {
  content:''; position:absolute; inset:0; border-radius:18px;
  background:linear-gradient(135deg,rgba(56,189,248,0.04) 0%,transparent 60%); pointer-events:none;
}
.cf-top { display:flex; align-items:center; gap:0.6rem; margin-bottom:1rem; }
.cf-tag { font-family:'Fira Code',monospace; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); opacity:0.7; }
.cf-body { flex:1; display:flex; align-items:center; justify-content:center; text-align:center; }
.cf-question {
  font-family:'Syne',sans-serif; font-size:clamp(0.85rem,2vw,1.1rem); font-weight:700;
  line-height:1.5; letter-spacing:-0.01em; color:var(--text); max-width:660px; white-space:pre-line;
}
.opts-block {
  display:block; margin-top:0.75rem; font-family:'Fira Code',monospace; font-size:0.76rem;
  font-weight:400; color:var(--muted); text-align:left; line-height:1.9; letter-spacing:0;
}
.cf-bottom { display:flex; align-items:center; justify-content:center; gap:0.5rem; margin-top:1.25rem; font-size:0.75rem; color:var(--muted); font-family:'Fira Code',monospace; }
.tap-hint { opacity:0.6; animation:fadeHint 3s ease-in-out infinite; }
@keyframes fadeHint { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
.cb-tag { font-family:'Fira Code',monospace; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); margin-bottom:0.75rem; display:flex; align-items:center; gap:0.5rem; }
.cb-answer { flex:1; font-size:0.88rem; line-height:1.8; color:var(--text); white-space:pre-line; overflow-y:auto; }
.selfmark { display:flex; gap:0.75rem; justify-content:center; margin-top:1.1rem; }
.sm-btn { flex:1; max-width:200px; padding:0.6em 0; border-radius:10px; border:1px solid; font-family:'Plus Jakarta Sans',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; transition:all 0.18s; display:flex; align-items:center; justify-content:center; gap:0.5rem; }
.sm-btn.got  { border-color:rgba(52,211,153,0.35); background:rgba(52,211,153,0.1); color:#34d399; }
.sm-btn.got:hover  { background:rgba(52,211,153,0.2); border-color:#34d399; }
.sm-btn.nope { border-color:rgba(248,113,113,0.35); background:rgba(248,113,113,0.1); color:#f87171; }
.sm-btn.nope:hover { background:rgba(248,113,113,0.2); border-color:#f87171; }
.nav-row { display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:1.25rem; }
.nav-btn { padding:0.55em 1.3em; border-radius:10px; border:1px solid var(--border2); background:var(--surface); color:var(--muted); font-family:'Plus Jakarta Sans',sans-serif; font-size:0.8rem; font-weight:600; cursor:pointer; transition:all 0.18s; }
.nav-btn:hover { border-color:var(--accent); color:var(--accent); }
.nav-btn:disabled { opacity:0.3; cursor:default; pointer-events:none; }
.nav-center { display:flex; flex-direction:column; align-items:center; gap:0.25rem; }
.nav-card-num { font-family:'Syne',sans-serif; font-size:1.35rem; font-weight:800; letter-spacing:-0.02em; }
.nav-card-total { font-family:'Fira Code',monospace; font-size:0.66rem; color:var(--muted); }
.dot-row { display:flex; justify-content:center; gap:4px; flex-wrap:wrap; margin-bottom:1.25rem; }
.mini-dot { width:7px; height:7px; border-radius:50%; background:var(--border2); transition:all 0.25s; cursor:pointer; flex-shrink:0; }
.mini-dot.current { background:var(--accent); box-shadow:0 0 7px var(--accent); transform:scale(1.4); }
.mini-dot.known   { background:#34d399; opacity:0.7; }
.mini-dot.unsure  { background:#f87171; opacity:0.7; }
.known-strip { display:flex; align-items:center; gap:1rem; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:0.75rem 1.1rem; margin-bottom:1.25rem; }
.ks-item { display:flex; align-items:center; gap:0.5rem; font-family:'Fira Code',monospace; font-size:0.75rem; color:var(--muted); }
.ks-val { font-size:1.05rem; font-weight:700; font-family:'Syne',sans-serif; }
.ks-green .ks-val { color:#34d399; } .ks-red .ks-val { color:#f87171; } .ks-grey .ks-val { color:var(--muted); }
.ks-bar { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.ks-bar-fill { height:100%; background:linear-gradient(90deg,#34d399,var(--accent)); border-radius:3px; transition:width 0.4s; }
.btn-shuffle { padding:0.45em 1.1em; border-radius:10px; border:1px solid var(--border2); background:var(--surface2); color:var(--muted); font-family:'Plus Jakarta Sans',sans-serif; font-size:0.78rem; font-weight:600; cursor:pointer; transition:all 0.18s; }
.btn-shuffle:hover { border-color:var(--accent); color:var(--accent); }
.win-state { display:none; text-align:center; background:var(--surface); border:1px solid rgba(56,189,248,0.3); border-radius:18px; padding:3rem 2rem; animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
.win-state.show { display:block; }
.win-emoji { font-size:3.5rem; margin-bottom:1rem; }
.win-title { font-family:'Syne',sans-serif; font-size:1.7rem; font-weight:800; color:var(--accent); letter-spacing:-0.02em; margin-bottom:0.5rem; }
.win-sub { font-size:0.88rem; color:var(--muted); margin-bottom:2rem; }
.win-stats { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem; }
.win-stat { background:var(--surface2); border:1px solid var(--border2); border-radius:12px; padding:1rem 1.5rem; min-width:90px; }
.win-stat-val { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; }
.win-stat-lbl { font-size:0.7rem; color:var(--muted); font-family:'Fira Code',monospace; margin-top:0.2rem; }
.btn-restart { padding:0.65em 2em; border-radius:10px; border:none; background:var(--accent); color:#000; font-family:'Plus Jakarta Sans',sans-serif; font-size:0.88rem; font-weight:800; cursor:pointer; }
.btn-restart:hover { opacity:0.88; }
@keyframes popIn { from{opacity:0;transform:scale(0.88)} to{opacity:1;transform:scale(1)} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
