<script>
const ALL_CARDS = [{"topic": "1", "ch": "1.1 Properties of Materials", "q": "Which of the following is an EXTENSIVE physical property?\n\nA. Density\nB. Colour\nC. Mass\nD. Temperature", "a": "Answer: C. Mass\n\nMass is extensive - it changes proportionally with the amount of material. Density, colour, and temperature are intensive (they don't change when you change the amount).", "type": "mcq"}, {"topic": "1", "ch": "1.1 Properties of Materials", "q": "Which THREE are chemical properties?\n\nA. Reactivity, acidity, and oxidation\nB. Melting point, colour, and density\nC. Solubility, temperature, and mass\nD. Boiling point, lustre, and ductility", "a": "Answer: A. Reactivity, acidity, and oxidation\n\nChemical properties (reactivity, acidity, oxidation, combustion) can only be observed when a chemical reaction occurs and the substance changes identity. All others listed are physical properties.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Properties of Materials", "q": "Which THREE are physical properties?\n\nA. Combustion, acidity, reactivity\nB. Melting point, colour, density\nC. Oxidation, flammability, corrosion\nD. Reactivity, mass, combustion", "a": "Answer: B. Melting point, colour, density\n\nMelting point, colour, and density are physical properties - observable without a chemical reaction. Combustion, acidity, reactivity, and oxidation all require a chemical change.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Properties of Materials", "q": "Why are intensive properties useful for identifying materials?\n\nA. They are always larger numbers\nB. They do not change with the amount of substance, so they are characteristic of the material itself\nC. They are easier to measure\nD. They require less equipment", "a": "Answer: B. They do not change with the amount of substance, so they are characteristic of the material itself\n\nIntensive properties (density, colour, melting point) do not change based on how much material you have, so they uniquely characterise a substance regardless of sample size.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Properties of Materials", "q": "Define solubility and give an example with correct units.", "a": "Solubility is the amount of solute that can dissolve in a given solvent at a given temperature. Example: sugar has a solubility of 200 g/dL at 25 degrees C.", "type": "short"}, {"topic": "1", "ch": "1.1 Properties of Materials", "q": "What makes nichrome suitable for electric heating elements?\n\nA. It is a perfect insulator\nB. It has delocalised electrons and conducts with no heat\nC. It is a high-resistance conductor - current generates heat and it has a high melting point\nD. It is an ionic conductor that works when dissolved", "a": "Answer: C. It is a high-resistance conductor - current generates heat and it has a high melting point\n\nNichrome is a high-resistance conductor (Ni-Cr alloy). Resistance causes electrical energy to convert to heat. Its high melting point means it withstands the temperatures required for oven heating elements.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Properties of Materials", "q": "Pure water does NOT conduct electricity because:\n\nA. It is too cold\nB. It has no free charged particles\nC. It is covalently bonded\nD. It has a low boiling point", "a": "Answer: B. It has no free charged particles\n\nElectrical conductivity requires free-moving charged particles. Pure water has none. When ionic substances dissolve, the freed ions can carry charge.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Properties of Materials", "q": "A material has a very low melting point of -23 degrees C. What type of solid is it most likely?\n\nA. Covalent network\nB. Metallic\nC. Ionic\nD. Covalent molecular", "a": "Answer: D. Covalent molecular\n\nCovalent molecular solids have the weakest forces and lowest melting points. Example: CCl4 melts at -23 degrees C. Covalent networks and ionic solids have much higher melting points.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Properties of Materials", "q": "Explain the difference between a thermal conductor and a thermal insulator. Give one example of each.", "a": "Thermal conductors transfer heat rapidly (high thermal conductivity), e.g. copper/metals. Thermal insulators transfer heat slowly (low thermal conductivity), e.g. plastic. A vacuum is a perfect insulator - no particles means no conduction at all.", "type": "short"}, {"topic": "1", "ch": "1.1 Nanomaterials", "q": "What defines a nanomaterial?\n\nA. Any material smaller than 1 mm\nB. A material with particles between 1-100 nm\nC. A synthetic material made in a lab\nD. A material with no electrical conductivity", "a": "Answer: B. A material with particles between 1-100 nm\n\nNanomaterials are defined as substances containing particles in the size range 1-100 nanometres (nm). At this scale, materials show dramatically different properties from their bulk forms.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Nanomaterials", "q": "What is the defining physical feature of nanomaterials?\n\nA. Very low density\nB. Enormous surface area to volume ratio\nC. High electrical conductivity\nD. Transparent appearance", "a": "Answer: B. Enormous surface area to volume ratio\n\nThe enormous surface area to volume ratio means far more atoms are at the surface, enabling more efficient catalysis and unique properties.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Nanomaterials", "q": "Why do gold nanoparticles appear red, green or purple instead of gold?\n\nA. They contain impurities\nB. At the nanoscale, individual atom count and arrangement changes optical properties\nC. They are different elements\nD. Gold is transparent at small sizes", "a": "Answer: B. At the nanoscale, individual atom count and arrangement changes optical properties\n\nBulk properties arise from many atoms acting together. At the nanoscale, the number and arrangement of individual atoms directly determines optical behaviour - producing different colours for different sizes.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Nanomaterials", "q": "Explain how synthetic lipid nanoparticles were critical for COVID-19 mRNA vaccines.", "a": "mRNA molecules are highly unstable and would break down before reaching cells. Lipid nanoparticles acted as envelopes that encased and protected the mRNA, delivering it into cells intact so it could initiate an immune response.", "type": "short"}, {"topic": "1", "ch": "1.1 Mixtures & Separation", "q": "Blood appears uniform but is classified as a heterogeneous mixture. Why?\n\nA. Because it contains iron\nB. Because different cell types (red, white blood cells, platelets) make it non-uniform at the molecular level\nC. Because plasma is an element\nD. Because it changes colour with temperature", "a": "Answer: B. Because different cell types (red, white blood cells, platelets) make it non-uniform at the molecular level\n\nHeterogeneous means not uniform at the molecular level. Blood contains different types of cells with different compositions - at the cellular/molecular scale, different parts are clearly distinguishable.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Mixtures & Separation", "q": "Why is filtration NOT suitable for separating dissolved salt from water?\n\nA. Salt is too heavy\nB. Dissolved salt ions are smaller than filter paper pores - they pass straight through\nC. Filtration only works with gases\nD. Salt destroys filter paper", "a": "Answer: B. Dissolved salt ions are smaller than filter paper pores - they pass straight through\n\nFiltration separates solid particles from liquids. When salt dissolves, it dissociates into individual ions - far smaller than filter paper gaps. Evaporation or distillation is needed instead.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Mixtures & Separation", "q": "What property difference does evaporation exploit?\n\nA. Particle size\nB. Density\nC. Boiling point - solvent evaporates, solute with much higher bp remains\nD. Solubility", "a": "Answer: C. Boiling point - solvent evaporates, solute with much higher bp remains\n\nEvaporation heats the mixture to above the solvent boiling point. The solvent vaporises and is lost; the solute, with a much higher boiling point, remains behind in the dish.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Mixtures & Separation", "q": "Fractional distillation is preferred over simple distillation when:\n\nA. The mixture contains a solid\nB. Components have very different boiling points\nC. Components have similar boiling points\nD. The mixture is heterogeneous", "a": "Answer: C. Components have similar boiling points\n\nSimple distillation works when boiling points differ greatly. A fractionating column allows repeated condensation/re-vaporisation cycles, giving precision separation for components with similar boiling points such as crude oil fractions.", "type": "mcq"}, {"topic": "1", "ch": "1.1 Mixtures & Separation", "q": "Describe simple distillation: what does it separate, how does it work, and what is the distillate?", "a": "Simple distillation separates a low-boiling-point liquid from other substances. The mixture is heated; the lowest-boiling component vaporises first. Vapour enters a condenser, cools into liquid, and is collected as the distillate. The remaining components stay in the flask.", "type": "short"}, {"topic": "1", "ch": "1.2 Atomic Structure", "q": "What is the atomic number of an element?\n\nA. Protons + neutrons\nB. Number of neutrons only\nC. Number of protons - defines the element's identity\nD. Number of electrons only", "a": "Answer: C. Number of protons - defines the element's identity\n\nThe atomic number (Z) is the number of protons in the nucleus. It defines which element the atom is - no two elements have the same atomic number.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Atomic Structure", "q": "An atom of calcium is written as 42/20 Ca. How many neutrons does it have?\n\nA. 20\nB. 42\nC. 22\nD. 62", "a": "Answer: C. 22\n\nNeutrons = A - Z = 42 - 20 = 22. A (mass number) is the top number; Z (atomic number) is the bottom number.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Atomic Structure", "q": "What is the electron capacity of the 3rd shell?\n\nA. 2\nB. 8\nC. 18\nD. 32", "a": "Answer: C. 18\n\nShell capacity = 2n^2. For n=3: 2(9) = 18. Shells 1,2,3,4 hold 2, 8, 18, 32 electrons respectively.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Atomic Structure", "q": "What is the main-shell electron configuration of phosphorus (Z=15)?\n\nA. 2,8,5\nB. 2,8,4\nC. 2,5,8\nD. 2,8,7", "a": "Answer: A. 2,8,5\n\nPhosphorus has 15 electrons: 2 in shell 1, 8 in shell 2, 5 in shell 3. Configuration: 2,8,5. It is in Period 3, Group V.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Atomic Structure", "q": "State three differences between a proton and an electron.", "a": "1. Location: protons are in the nucleus; electrons orbit in shells outside. 2. Charge: protons are +1; electrons are -1. 3. Mass: protons are approximately 1 amu; electrons are approximately 1/1800 amu (negligible).", "type": "short"}, {"topic": "1", "ch": "1.2 Subshell Configurations", "q": "What is the correct subshell configuration for chlorine (Z=17)?\n\nA. 1s2 2s2 2p6 3s2 3p7\nB. 1s2 2s2 2p6 3s2 3p5\nC. 1s2 2s2 2p5 3s2 3p6\nD. 1s2 2s2 2p6 3s1 3p6", "a": "Answer: B. 1s2 2s2 2p6 3s2 3p5\n\nChlorine has 17 electrons. Fill: 1s2(2) + 2s2(4) + 2p6(10) + 3s2(12) + 3p5(17). Note: p can only hold 6 electrons maximum, so 3p7 is impossible.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Subshell Configurations", "q": "Why does the 4s subshell fill BEFORE the 3d subshell?\n\nA. 4s has more orbitals\nB. 4s is lower in energy than 3d due to shell overlap\nC. The s subshell always fills before d\nD. 4s is closer to the nucleus", "a": "Answer: B. 4s is lower in energy than 3d due to shell overlap\n\nSubshells fill from lowest energy first. Due to energy level overlap between the 3rd and 4th shells, 4s is actually lower in energy than 3d. So potassium's 19th electron goes to 4s1, not 3d1.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Subshell Configurations", "q": "Which element has the configuration 1s2 2s2 2p6 3s2 3p6 4s1?\n\nA. Calcium\nB. Argon\nC. Potassium\nD. Copper", "a": "Answer: C. Potassium\n\n19 electrons total. The 19th goes to 4s1 (not 3d1). Element 19 = potassium (K).", "type": "mcq"}, {"topic": "1", "ch": "1.2 Subshell Configurations", "q": "Chromium ends in 4s1 3d5 instead of 4s2 3d4. Why?\n\nA. Chromium has too many protons for 4s2\nB. A half-filled d subshell (d5) is especially stable due to symmetry\nC. The 3d subshell fills before 4s in chromium\nD. It is an error in the periodic table", "a": "Answer: B. A half-filled d subshell (d5) is especially stable due to symmetry\n\nA half-filled d subshell (d5) has a symmetry that provides extra stability. The energy gained by achieving d5 symmetry exceeds the cost of moving one electron from 4s to 3d. Copper (4s1 3d10) has the same reasoning for a full d10.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Subshell Configurations", "q": "When nickel (Z=28) forms Ni2+, which electrons are lost first?\n\nA. The 3d electrons\nB. The 4s electrons\nC. The 3p electrons\nD. The innermost 1s electrons", "a": "Answer: B. The 4s electrons\n\nTransition metals lose electrons from the ns subshell BEFORE the (n-1)d subshell. Despite 4s filling before 3d, electrons are removed from 4s first when forming ions. Ni2+ loses both 4s electrons, keeping 3d8.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Subshell Configurations", "q": "Write the full subshell electron configuration for arsenic (Z=33). State which block and group it belongs to.", "a": "As: 1s2 2s2 2p6 3s2 3p6 4s2 3d10 4p3. Arsenic is in the p-block (highest subshell is 4p3). It is in Group V (main group 15) - 3 electrons in the outermost p subshell gives 5 total valence electrons.", "type": "short"}, {"topic": "1", "ch": "1.2 Spectra", "q": "What does an atomic absorption spectrum look like?\n\nA. Bright coloured lines on a dark background\nB. Dark lines on a continuous rainbow background\nC. A single solid colour for each element\nD. A spectrum with no visible lines", "a": "Answer: B. Dark lines on a continuous rainbow background\n\nIn absorption spectroscopy, white light passes through a gas. Specific wavelengths are absorbed (electrons promoted). The transmitted light shows dark lines at those absorbed wavelengths on an otherwise continuous rainbow background.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Spectra", "q": "Why can spectroscopy identify elements in distant stars?\n\nA. Stars emit all wavelengths equally\nB. Each element produces a unique pattern of absorbed/emitted wavelengths - a spectral fingerprint\nC. Temperature determines visible colour\nD. Only hydrogen can be detected this way", "a": "Answer: B. Each element produces a unique pattern of absorbed/emitted wavelengths - a spectral fingerprint\n\nEach element has unique energy gaps between its electron shells, producing a unique wavelength pattern. This fingerprint is identical everywhere in the universe, so matching a star's spectrum to known element spectra reveals its composition.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Spectra", "q": "The emission and absorption spectra of the same element have wavelengths that are:\n\nA. Completely different\nB. Identical - same energy gaps produce same wavelengths whether absorbing or emitting\nC. Similar but shifted\nD. Different because emission involves more electrons", "a": "Answer: B. Identical - same energy gaps produce same wavelengths whether absorbing or emitting\n\nThe energy gap between shells is the same whether being absorbed or emitted. An electron absorbs a photon of wavelength X to jump up; when it falls back, it emits a photon of the same wavelength X.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Spectra", "q": "Explain why atoms can only absorb specific wavelengths of light and not others.", "a": "Electrons exist in discrete energy levels (shells). A photon must have EXACTLY the right energy to promote an electron between specific shells - partial absorption is impossible. Energy is inversely proportional to wavelength, so only photons of specific wavelengths match the exact energy gaps. Photons that do not match pass straight through.", "type": "short"}, {"topic": "1", "ch": "1.2 Isotopes", "q": "Carbon-12 and Carbon-14 are isotopes. Which is correct?\n\nA. Different proton numbers\nB. Same protons, different neutrons, identical chemical properties\nC. Same mass, different chemical reactions\nD. Different numbers of electrons", "a": "Answer: B. Same protons, different neutrons, identical chemical properties\n\nBoth have Z=6 (6 protons, 6 electrons). C-12 has 6 neutrons; C-14 has 8 neutrons. Chemical properties are identical because they depend on electron configuration - which is the same for both.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Isotopes", "q": "An atom has 8 protons and 10 neutrons. Which notation is correct?\n\nA. 8/18 O\nB. 18/8 O\nC. 10/8 O\nD. 8/10 O", "a": "Answer: B. 18/8 O\n\nA = protons + neutrons = 8 + 10 = 18. Z = protons = 8. Notation: A on top, Z on bottom. 8 protons = oxygen. So: 18/8 O (oxygen-18).", "type": "mcq"}, {"topic": "1", "ch": "1.2 Isotopes", "q": "Bromine: Br-79 (50.7%, 78.92 amu) and Br-81 (49.3%, 80.92 amu). What is the relative atomic mass?\n\nA. 79.00\nB. 79.91\nC. 80.00\nD. 80.92", "a": "Answer: B. 79.91\n\nAr = (0.507 x 78.92) + (0.493 x 80.92) = 40.01 + 39.89 = 79.90, approximately 79.91. Relative atomic mass is a weighted average based on isotope abundance.", "type": "mcq"}, {"topic": "1", "ch": "1.2 Isotopes", "q": "Nitrogen-14 and nitrogen-15 are two stable isotopes. Write the composite symbol for each and state how many neutrons each has.", "a": "Nitrogen-14: 14/7 N - 7 protons, 7 neutrons (14-7=7). Nitrogen-15: 15/7 N - 7 protons, 8 neutrons (15-7=8). Both have 7 protons and 7 electrons - same element, identical chemistry.", "type": "short"}, {"topic": "1", "ch": "1.3 Moles & Calculations", "q": "What is Avogadro's number?\n\nA. 6.02 x 10^20\nB. 6.02 x 10^23\nC. 6.02 x 10^26\nD. 1.66 x 10^-24", "a": "Answer: B. 6.02 x 10^23\n\nAvogadro's number = 6.02 x 10^23. This is the number of particles in 1 mole of any substance. It was chosen so that 1 mole of carbon-12 has a mass of exactly 12.00 g.", "type": "mcq"}, {"topic": "1", "ch": "1.3 Moles & Calculations", "q": "Calculate the molar mass of sulfuric acid H2SO4. (H=1.01, S=32.07, O=16.00)\n\nA. 81.09 g/mol\nB. 98.09 g/mol\nC. 96.07 g/mol\nD. 34.09 g/mol", "a": "Answer: B. 98.09 g/mol\n\nM(H2SO4) = 2(1.01) + 32.07 + 4(16.00) = 2.02 + 32.07 + 64.00 = 98.09 g/mol.", "type": "mcq"}, {"topic": "1", "ch": "1.3 Moles & Calculations", "q": "An iron sample has a mass of 5.585 g. How many moles of Fe? (M=55.85 g/mol)\n\nA. 0.100 mol\nB. 0.500 mol\nC. 1.00 mol\nD. 5.00 mol", "a": "Answer: A. 0.100 mol\n\nn = m/M = 5.585/55.85 = 0.100 mol. Always divide mass by molar mass to find moles.", "type": "mcq"}, {"topic": "1", "ch": "1.3 Moles & Calculations", "q": "How many moles of H atoms are in 3.00 mol of CH4?\n\nA. 3.00 mol\nB. 12.00 mol\nC. 4.00 mol\nD. 1.00 mol", "a": "Answer: B. 12.00 mol\n\nEach CH4 molecule contains 4 hydrogen atoms. So n(H) = 3.00 x 4 = 12.00 mol H atoms. Multiply moles of compound by the number of that atom per formula unit.", "type": "mcq"}, {"topic": "1", "ch": "1.3 Moles & Calculations", "q": "STOICHIOMETRY: 2H2 + O2 -> 2H2O. You have 4.04 g of H2 (M=2.02 g/mol). Find: moles of H2, moles of H2O produced, mass of H2O (M=18.02 g/mol), and number of H2O molecules.", "a": "n(H2) = 4.04/2.02 = 2.00 mol. Ratio H2:H2O = 2:2 = 1:1, so n(H2O) = 2.00 mol. m(H2O) = 2.00 x 18.02 = 36.04 g. Molecules = 2.00 x 6.02x10^23 = 1.20x10^24 molecules.", "type": "short"}, {"topic": "1", "ch": "1.3 Moles & Calculations", "q": "STOICHIOMETRY: N2 + 3H2 -> 2NH3 (Haber process). Start with 56.04 g of N2 (M=28.02 g/mol). Find moles of N2, moles of NH3 produced, and mass of NH3 (M=17.04 g/mol).", "a": "n(N2) = 56.04/28.02 = 2.00 mol. Ratio N2:NH3 = 1:2, so n(NH3) = 4.00 mol. m(NH3) = 4.00 x 17.04 = 68.16 g.", "type": "short"}, {"topic": "1", "ch": "1.3 Moles & Calculations", "q": "What is the difference between molar mass and relative molecular mass? Give an example showing both for water.", "a": "Molar mass (M): mass of 1 mole in g/mol - has units. M(H2O) = 18.02 g/mol. Relative molecular mass (Mr): dimensionless - compared to carbon-12. Mr(H2O) = 18.02. Both are calculated the same way but Mr has no units.", "type": "short"}, {"topic": "1", "ch": "1.4 Periodic Table", "q": "An element has configuration 1s2 2s2 2p6 3s2 3p4. What period and group is it in?\n\nA. Period 2, Group IV\nB. Period 3, Group VI\nC. Period 3, Group IV\nD. Period 4, Group VI", "a": "Answer: B. Period 3, Group VI\n\nHighest occupied shell = 3 -> Period 3. Valence electrons = 3s2 3p4 = 6 total -> Group VI (main group 16). This element is sulfur (S).", "type": "mcq"}, {"topic": "1", "ch": "1.4 Periodic Table", "q": "Which block do the transition metals belong to?\n\nA. s-block\nB. p-block\nC. d-block\nD. f-block", "a": "Answer: C. d-block\n\nTransition metals (Groups III-XII) have their highest energy electrons in d subshells. They form the d-block of the periodic table.", "type": "mcq"}, {"topic": "1", "ch": "1.4 Periodic Table", "q": "Why is helium placed in Group XVIII despite having an s2 configuration?\n\nA. It has 2 electrons only\nB. It shares noble gas properties - non-reactive, full outer shell - so it belongs with Group XVIII\nC. It is an error in the periodic table\nD. Helium is actually in Group II", "a": "Answer: B. It shares noble gas properties - non-reactive, full outer shell - so it belongs with Group XVIII\n\nHelium's properties (non-reactive, full outer shell, forms no bonds) are identical to the other noble gases (Ne, Ar, Kr). Chemical behaviour takes priority over configuration in this case.", "type": "mcq"}, {"topic": "1", "ch": "1.4 Periodic Trends", "q": "Atomic radius INCREASES as you:\n\nA. Move left to right across a period\nB. Move down a group\nC. Move from metals to non-metals\nD. Move to higher atomic number within a period", "a": "Answer: B. Move down a group\n\nMoving down a group, electrons occupy higher shells further from the nucleus, so radius increases. Moving left to right across a period, radius decreases - more protons pull all electrons closer.", "type": "mcq"}, {"topic": "1", "ch": "1.4 Periodic Trends", "q": "Why does electronegativity decrease DOWN a group?\n\nA. Fewer protons are present\nB. Larger atomic radius and more electron shielding weaken the nuclear pull on bonding electrons\nC. The element becomes more metallic\nD. Higher shells have more energy so attract electrons more", "a": "Answer: B. Larger atomic radius and more electron shielding weaken the nuclear pull on bonding electrons\n\nTwo reasons: (1) Greater atomic radius - bonding electrons are further from nucleus. (2) More inner electrons create shielding - reducing effective nuclear pull. Both decrease the atom's ability to attract bonding electrons.", "type": "mcq"}, {"topic": "1", "ch": "1.4 Periodic Trends", "q": "A Group VII element will form an ion with charge:\n\nA. +7\nB. -1\nC. +1\nD. -7", "a": "Answer: B. -1\n\nGroup VII elements have 7 valence electrons and need only 1 more to complete their octet. They gain 1 electron to form a -1 anion (e.g. F-, Cl-, Br-, I-). Charge = 8 - Group number = 8 - 7 = 1-.", "type": "mcq"}, {"topic": "1", "ch": "1.4 Periodic Trends", "q": "Which element has a SMALLER atomic radius than sodium (Na, Z=11)?\n\nA. Potassium (K)\nB. Lithium (Li)\nC. Magnesium (Mg)\nD. Rubidium (Rb)", "a": "Answer: C. Magnesium (Mg)\n\nMoving right across period 3 from Na to Mg: same shell (n=3), but Mg has 12 protons vs Na's 11. Greater nuclear charge pulls all electrons closer, decreasing radius. Mg is smaller than Na.", "type": "mcq"}, {"topic": "1", "ch": "1.4 Periodic Trends", "q": "Which set correctly describes non-metals?\n\nA. Lustrous, ductile, good conductors, low electronegativity\nB. Dull, brittle, poor conductors, high electronegativity, form anions\nC. High melting point, malleable, form cations\nD. Soft, good conductors, form positive ions", "a": "Answer: B. Dull, brittle, poor conductors, high electronegativity, form anions\n\nNon-metals are on the right of the periodic table. They are dull, brittle, poor conductors, have high electronegativity, and gain electrons to form negative anions.", "type": "mcq"}, {"topic": "1", "ch": "1.4 Periodic Trends", "q": "Explain the trend in electronegativity across period 3 (Na to Cl). Use values Na=0.9 and Cl=3.2.", "a": "Electronegativity increases from Na (0.9) to Cl (3.2) across period 3. Moving right, atomic radius decreases (more protons, same shell). The smaller radius means the nucleus is closer to bonding electrons and attracts them more strongly - increasing electronegativity.", "type": "short"}, {"topic": "1", "ch": "1.4 Periodic Trends", "q": "Describe what metalloids are, where they are found on the periodic table, and give two examples.", "a": "Metalloids display both metallic and non-metallic properties. They are found along the diagonal staircase boundary between metals (left) and non-metals (right). Examples: silicon (Si) used as a semiconductor in electronics; arsenic (As) which is semi-conducting; germanium (Ge).", "type": "short"}, {"topic": "2", "ch": "2.1 Types of Materials", "q": "Which type of solid is formed exclusively between metal atoms?\n\nA. Ionic solid\nB. Covalent molecular solid\nC. Metallic solid\nD. Covalent network solid", "a": "Answer: C. Metallic solid\n\nMetallic solids are formed from the interaction of metal atoms only. The structure consists of positive metal cations surrounded by a sea of delocalised electrons.", "type": "mcq"}, {"topic": "2", "ch": "2.1 Types of Materials", "q": "Sodium chloride (NaCl) is best classified as:\n\nA. A covalent molecular solid\nB. A metallic solid\nC. An ionic solid\nD. A covalent network solid", "a": "Answer: C. An ionic solid\n\nNaCl forms from the electrostatic attraction between Na+ cations and Cl- anions in a 3D ionic lattice. It forms between a metallic and a non-metallic element.", "type": "mcq"}, {"topic": "2", "ch": "2.1 Types of Materials", "q": "Which type of solid has discrete molecules interacting via intermolecular forces?\n\nA. Metallic\nB. Ionic\nC. Covalent network\nD. Covalent molecular", "a": "Answer: D. Covalent molecular\n\nCovalent molecular solids (e.g. iodine, sucrose) consist of discrete molecules. The molecules interact with adjacent molecules via weak intermolecular forces, giving them relatively low melting points.", "type": "mcq"}, {"topic": "2", "ch": "2.1 Types of Materials", "q": "Rank these solids from HIGHEST to LOWEST melting point: diamond (covalent network), NaCl (ionic), iodine (covalent molecular), copper (metallic).\n\nA. Diamond > Copper > NaCl > Iodine\nB. Copper > Diamond > NaCl > Iodine\nC. Diamond > NaCl > Copper > Iodine\nD. NaCl > Diamond > Copper > Iodine", "a": "Answer: A. Diamond > Copper > NaCl > Iodine\n\nCovalent networks have the strongest bonds (very high mp ~3500C for diamond) > Metallic (high, ~1085C for copper) > Ionic (moderate-high, ~801C for NaCl) > Covalent molecular (low, ~114C for iodine).", "type": "mcq"}, {"topic": "2", "ch": "2.1 Types of Materials", "q": "Which material conducts electricity in SOLID form?\n\nA. Sodium chloride (NaCl)\nB. Silicon dioxide (SiO2)\nC. Copper (Cu)\nD. Iodine (I2)", "a": "Answer: C. Copper (Cu)\n\nMetallic solids like copper conduct in solid form because delocalised electrons are free to move even when solid. Ionic solids only conduct when molten or dissolved; covalent solids generally do not conduct.", "type": "mcq"}, {"topic": "2", "ch": "2.1 Types of Materials", "q": "Molten NaCl conducts electricity but solid NaCl does not. Why?\n\nA. Melting creates new electrons\nB. When molten, ions are no longer locked in fixed positions and are free to move and carry charge\nC. NaCl becomes a metal when molten\nD. Melting changes NaCl into a covalent compound", "a": "Answer: B. When molten, ions are no longer locked in fixed positions and are free to move and carry charge\n\nIn solid NaCl, ions are fixed in the lattice - they cannot move to carry charge. When molten, the ionic bonds are broken and ions can flow freely, allowing electrical conduction.", "type": "mcq"}, {"topic": "2", "ch": "2.1 Types of Materials", "q": "Graphite is a covalent network solid that conducts electricity. Why is this exceptional?\n\nA. Graphite contains metal impurities\nB. Each carbon in graphite has a delocalised fourth electron that moves freely between layers\nC. Graphite's layered structure creates ionic bonds\nD. Carbon forms metallic bonds in graphite", "a": "Answer: B. Each carbon in graphite has a delocalised fourth electron that moves freely between layers\n\nIn graphite, each carbon bonds to only three adjacent atoms. The fourth valence electron is delocalised and free to move between graphite layers - giving it excellent electrical conductivity, unlike most covalent networks.", "type": "mcq"}, {"topic": "2", "ch": "2.1 Types of Materials", "q": "Complete the conductivity table for the four solid types. For each type, state whether it conducts in: (a) solid form, (b) molten form, and (c) aqueous solution. Explain your reasoning for ionic solids.", "a": "Metallic: solid YES, molten YES, aqueous N/A. Ionic: solid NO (ions fixed), molten YES (ions free), aqueous YES (ions free). Covalent network: solid NO (exception: graphite), molten NO, aqueous N/A. Covalent molecular: solid NO, molten NO, aqueous NO. Ionic reasoning: in solid form ions are locked in the lattice and cannot carry charge. When molten or dissolved, ions are released and free to move, allowing electrical conduction.", "type": "short"}, {"topic": "2", "ch": "2.2 Octet Rule & Ion Formation", "q": "Why do noble gases rarely form chemical bonds?\n\nA. They are too heavy\nB. They already possess a complete octet (8 valence electrons) and are stable\nC. They have no protons\nD. They are found only at high temperatures", "a": "Answer: B. They already possess a complete octet (8 valence electrons) and are stable\n\nNoble gases (Group VIII) already have a full octet in their atomic form - they are uniquely stable with zero charge when unbonded. They have no tendency to gain, lose, or share electrons.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Octet Rule & Ion Formation", "q": "A Group II element forms an ion by:\n\nA. Gaining 2 electrons to form a 2- ion\nB. Losing 2 electrons to form a 2+ cation\nC. Sharing 2 electrons\nD. Losing 1 electron to form a 1+ ion", "a": "Answer: B. Losing 2 electrons to form a 2+ cation\n\nGroup II elements have 2 valence electrons. Losing both achieves a noble gas configuration, forming a 2+ cation. Examples: Mg2+, Ca2+, Ba2+.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Octet Rule & Ion Formation", "q": "A Group VI non-metal forms an ion by:\n\nA. Losing 6 electrons\nB. Gaining 2 electrons to form a 2- anion\nC. Losing 2 electrons\nD. Gaining 6 electrons", "a": "Answer: B. Gaining 2 electrons to form a 2- anion\n\nGroup VI elements have 6 valence electrons and need 2 more to complete their octet. They gain 2 electrons to form a 2- anion. Examples: O2-, S2-.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Octet Rule & Ion Formation", "q": "Ionisation energy increases across a period because:\n\nA. Atomic radius increases across a period\nB. Greater nuclear charge and smaller atomic radius make it harder to remove electrons\nC. More electron shells are added\nD. Electrons are further from the nucleus", "a": "Answer: B. Greater nuclear charge and smaller atomic radius make it harder to remove electrons\n\nMoving left to right: more protons increase nuclear charge, and electrons are in the same shell so atomic radius decreases. Both effects mean electrons are held more tightly - requiring more energy to remove (higher ionisation energy).", "type": "mcq"}, {"topic": "2", "ch": "2.2 Octet Rule & Ion Formation", "q": "The naming convention for anions changes the element suffix to:\n\nA. -ite\nB. -ate\nC. -ide\nD. -ous", "a": "Answer: C. -ide\n\nAnions are named by replacing the elemental suffix with '-ide'. Examples: chlorine -> chloride, oxygen -> oxide, nitrogen -> nitride, sulfur -> sulfide.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Octet Rule & Ion Formation", "q": "Using the octet rule, predict the ion formed by: (a) aluminium (Group III), (b) sulfur (Group VI), (c) fluorine (Group VII). Write the ion symbol and explain why each forms that particular charge.", "a": "(a) Al3+: Aluminium has 3 valence electrons. Losing all 3 achieves a noble gas configuration - forms Al3+ cation. (b) S2-: Sulfur has 6 valence electrons. Gaining 2 completes its octet - forms S2- anion. (c) F-: Fluorine has 7 valence electrons. Gaining 1 completes its octet - forms F- anion. Each ion achieves 8 valence electrons (noble gas configuration).", "type": "short"}, {"topic": "2", "ch": "2.2 Bond Energy", "q": "Which statement about bond formation is always true?\n\nA. Bond formation always requires energy\nB. Bond formation always releases energy\nC. Bond formation is endothermic\nD. Bond formation has no energy change", "a": "Answer: B. Bond formation always releases energy\n\nBond formation ALWAYS releases energy as atoms reach a lower, more stable energy state. Bond breaking always requires energy. Whether the overall reaction is exo- or endothermic depends on the net energy change.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Bond Energy", "q": "In an EXOTHERMIC reaction:\n\nA. Products have higher enthalpy than reactants\nB. Energy released forming new bonds < energy required breaking old bonds\nC. Energy released forming new bonds > energy required breaking old bonds\nD. No activation energy is needed", "a": "Answer: C. Energy released forming new bonds > energy required breaking old bonds\n\nExothermic: energy released (bond formation) > energy required (bond breaking). Products sit at LOWER enthalpy than reactants. Excess energy is released to surroundings as heat.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Bond Energy", "q": "The reaction Na -> Na+ + e- has dH = +496 kJ/mol. This is:\n\nA. Exothermic - energy is released\nB. Endothermic - energy is absorbed\nC. Neutral - no energy change\nD. Spontaneous at all temperatures", "a": "Answer: B. Endothermic - energy is absorbed\n\nPositive dH means the products have HIGHER energy than the reactants - energy is absorbed from surroundings. This is endothermic. Removing an electron from sodium requires energy input to overcome the attraction between the electron and nucleus.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Bond Energy", "q": "What is activation energy?\n\nA. The total energy released in a reaction\nB. The energy difference between products and reactants\nC. The minimum energy required to start a chemical reaction by breaking existing bonds\nD. The energy of the fastest-moving particles", "a": "Answer: C. The minimum energy required to start a chemical reaction by breaking existing bonds\n\nActivation energy (Ea) is the minimum energy that must be provided to initiate a reaction. Even exothermic reactions need Ea to break existing bonds before new, more stable bonds can form. Measured in J/mol.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Bond Energy", "q": "Draw and describe the energy profile diagram for an exothermic reaction. Label: reactants, products, activation energy, and energy released. State where the dH is negative.", "a": "The energy profile starts at a high point (reactants), rises to a peak (transition state = activation energy above reactants), then falls to a lower final point (products). Activation energy (Ea) = height from reactants to peak. Energy released = height from peak down to products. Products sit LOWER than reactants - this energy difference is the heat released. dH is negative (products lower than reactants) for exothermic reactions.", "type": "short"}, {"topic": "2", "ch": "2.2 Metallic Bonding", "q": "What holds a metallic lattice together?\n\nA. Covalent bonds between metal atoms\nB. Ionic bonds between cations and anions\nC. Electrostatic attraction between positive metal cations and delocalised electrons\nD. Hydrogen bonds between metal layers", "a": "Answer: C. Electrostatic attraction between positive metal cations and delocalised electrons\n\nMetallic bonding: the strong electrostatic attraction between the lattice of positive metal cations and the sea of delocalised electrons. Although cations repel each other, delocalised electrons act as the binding glue.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Metallic Bonding", "q": "Why are metals malleable but ionic crystals are brittle?\n\nA. Metals have weaker bonds\nB. In metals, layers of cations can slide past each other while delocalised electrons maintain attraction; in ionic crystals, shifting layers aligns like charges causing repulsion and shattering\nC. Ionic crystals have no bonds\nD. Metals contain more electrons overall", "a": "Answer: B. In metals, layers of cations can slide past each other while delocalised electrons maintain attraction; in ionic crystals, shifting layers aligns like charges causing repulsion and shattering\n\nIn metals, when layers slide, the delocalised electron sea adjusts and maintains the attraction - bonds do not break. In ionic crystals, when layers shift, like-charged ions (+ with +, - with -) end up next to each other, creating repulsion that shatters the crystal.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Metallic Bonding", "q": "Why do metals conduct electricity?\n\nA. Metal cations carry charge\nB. Delocalised electrons are free to move toward a positive electrode, constituting an electric current\nC. Metal atoms collide and transfer electrons one at a time\nD. Metallic bonds break and reform rapidly", "a": "Answer: B. Delocalised electrons are free to move toward a positive electrode, constituting an electric current\n\nDelocalised electrons are not bound to individual atoms. In an electric field they flow toward the positive electrode and away from the negative electrode - this movement of charge IS an electric current.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Metallic Bonding", "q": "Aluminium (Group III, Al3+) has a higher melting point than magnesium (Group II, Mg2+) despite being in the same period. Why?\n\nA. Aluminium has more electrons\nB. Al3+ has a greater charge magnitude than Mg2+, creating stronger electrostatic attraction to delocalised electrons, requiring more energy to melt\nC. Magnesium has a larger atomic radius giving stronger bonding\nD. Aluminium is denser", "a": "Answer: B. Al3+ has a greater charge magnitude than Mg2+, creating stronger electrostatic attraction to delocalised electrons, requiring more energy to melt\n\nTwo factors: (1) Al3+ has greater charge than Mg2+ - stronger attraction to delocalised electrons. (2) Al has a smaller atomic radius than Mg (radius decreases left to right), so nuclei are closer to the electron sea, further strengthening the bond. Both increase Al's melting point.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Metallic Bonding", "q": "Why are alloys harder than pure metals?\n\nA. Alloys have more electrons\nB. Different-sized atoms distort the regular lattice, requiring greater force for layers to slide past each other\nC. Alloys form ionic bonds\nD. Alloys have lower melting points", "a": "Answer: B. Different-sized atoms distort the regular lattice, requiring greater force for layers to slide past each other\n\nIn a pure metal, atoms are uniform in size and layers slide relatively easily. In alloys, the presence of different-sized atoms distorts the regular lattice structure - layers are locked and require much greater force to move, increasing hardness.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Metallic Bonding", "q": "Using the metallic bonding model, explain each of these properties: (a) electrical conductivity, (b) thermal conductivity, (c) lustre.", "a": "(a) Electrical: delocalised electrons are free to move - they flow toward a positive electrode, creating an electric current. (b) Thermal: when heated, delocalised electrons gain kinetic energy and vibrate more rapidly, causing more frequent collisions that rapidly distribute heat throughout the metal. (c) Lustre: delocalised electrons absorb photons from light and jump to higher energy levels. When they return to lower levels, they re-emit photons - this absorption and re-emission of light produces the shiny, reflective appearance.", "type": "short"}, {"topic": "2", "ch": "2.2 Ionic Bonding", "q": "What are the two steps involved in forming an ionic bond?\n\nA. Sharing electrons then forming a lattice\nB. Electron transfer forming oppositely charged ions, then electrostatic attraction between them forming the ionic bond\nC. Heating the metal then cooling it\nD. Dissolving the ions then evaporating", "a": "Answer: B. Electron transfer forming oppositely charged ions, then electrostatic attraction between them forming the ionic bond\n\nStep 1: Electron transfer - metal loses electrons (cation forms) and non-metal gains them (anion forms). Step 2: Ionic bond - electrostatic attraction between the oppositely charged ions. This attraction releases energy.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Ionic Bonding", "q": "Why are ionic compounds hard but brittle?\n\nA. They have weak ionic bonds\nB. Hard because strong 3D ionic lattice with electrostatic forces; brittle because stress shifts layers, aligning like charges which repel and shatter the crystal\nC. They have covalent and ionic bonds mixed\nD. They contain free electrons that cause cracking", "a": "Answer: B. Hard because strong 3D ionic lattice with electrostatic forces; brittle because stress shifts layers, aligning like charges which repel and shatter the crystal\n\nHardness: the strong 3D electrostatic lattice resists deformation. Brittleness: unlike metals where layers can slide without bond-breaking, in ionic crystals shifting layers brings like-charges together (+ next to +), causing sudden repulsion and fracture along a smooth plane.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Ionic Bonding", "q": "MgSO4 solution conducts more electricity than NaCl solution at the same concentration. The best explanation is:\n\nA. MgSO4 is more soluble\nB. Mg2+ and SO42- ions have double the charge of Na+ and Cl-, so they carry more current per ion\nC. MgSO4 releases more electrons\nD. MgSO4 has a higher melting point", "a": "Answer: B. Mg2+ and SO42- ions have double the charge of Na+ and Cl-, so they carry more current per ion\n\nCurrent is carried by moving ions. Doubly charged ions (Mg2+ and SO42-) carry twice the charge per ion compared to singly charged ions (Na+ and Cl-). At the same concentration, the doubly charged ions produce approximately twice the current.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Ionic Bonding", "q": "Sodium reacts with chlorine to form sodium chloride. Describe the two steps of ionic bond formation using electron transfer diagrams in words: (a) what happens to sodium, (b) what happens to chlorine, (c) how the ionic bond forms.", "a": "(a) Sodium (Group I, 2,8,1) has 1 valence electron. It loses this electron, becoming Na+ (2,8). Energy equal to the ionisation energy must be provided. (b) Chlorine (Group VII, 2,8,7) gains the electron released by sodium, becoming Cl- (2,8,8). This is exothermic - energy is released as the electron enters. (c) The oppositely charged Na+ and Cl- ions attract each other electrostatically, releasing energy and forming an ionic bond. Many such ion pairs arrange into a 3D lattice to minimise repulsion and maximise attraction.", "type": "short"}, {"topic": "2", "ch": "2.2 Empirical Formulae", "q": "What is the empirical formula for magnesium oxide? (Mg2+, O2-)\n\nA. MgO2\nB. Mg2O\nC. MgO\nD. Mg2O2", "a": "Answer: C. MgO\n\nMg2+ and O2- have equal charge magnitudes (both 2). Ratio is 1:1, so the formula is MgO. The charges balance: 2+ and 2- = neutral.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Empirical Formulae", "q": "What is the empirical formula for aluminium chloride? (Al3+, Cl-)\n\nA. AlCl\nB. AlCl2\nC. AlCl3\nD. Al3Cl", "a": "Answer: C. AlCl3\n\nAl3+ needs three Cl- to balance. LCM of 3 and 1 is 3. Need 1x Al3+ and 3x Cl-. Formula: AlCl3. Check: 3+ from Al, 3x(1-) from 3 Cl = neutral.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Empirical Formulae", "q": "What is the empirical formula for aluminium oxide? (Al3+, O2-)\n\nA. AlO\nB. Al2O\nC. Al2O3\nD. AlO3", "a": "Answer: C. Al2O3\n\nAl3+ and O2-: LCM of 3 and 2 is 6. Need 2x Al3+ (gives 6+) and 3x O2- (gives 6-). Formula: Al2O3. Total charge: 6+ and 6- = neutral.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Empirical Formulae", "q": "What is the formula for iron(III) oxide? (Fe3+, O2-)\n\nA. FeO\nB. Fe2O3\nC. Fe3O2\nD. FeO3", "a": "Answer: B. Fe2O3\n\nFe3+ and O2-: LCM of 3 and 2 is 6. Need 2x Fe3+ and 3x O2-. Formula: Fe2O3. The (III) tells you Fe is in the +3 oxidation state here.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Empirical Formulae", "q": "The formula for magnesium nitrate is:\n\nA. MgNO3\nB. Mg(NO3)2\nC. Mg2NO3\nD. Mg2(NO3)3", "a": "Answer: B. Mg(NO3)2\n\nMg2+ and NO3- (polyatomic ion). Charge of Mg2+ is 2+; NO3- is 1-. Need 2x NO3- to balance. Formula: Mg(NO3)2. Brackets are used because the subscript 2 applies to the whole NO3 group.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Empirical Formulae", "q": "What is the formula for aluminium sulfate? (Al3+, SO42-)\n\nA. AlSO4\nB. Al2SO4\nC. Al2(SO4)3\nD. Al3(SO4)2", "a": "Answer: C. Al2(SO4)3\n\nAl3+ and SO42-: LCM of 3 and 2 is 6. Need 2x Al3+ and 3x SO42-. Formula: Al2(SO4)3. Brackets are essential for polyatomic ions with subscripts greater than 1.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Empirical Formulae", "q": "Write the empirical formula and explain your working for: (a) calcium fluoride (Ca2+, F-), (b) sodium carbonate (Na+, CO32-), (c) iron(II) sulfate (Fe2+, SO42-).", "a": "(a) Ca2+ and F-: charges unequal. Need 2x F- to balance Ca2+. Formula: CaF2. (2+ from Ca, 2x 1- from F = neutral). (b) Na+ and CO32-: unequal charges. LCM=2. Need 2x Na+ and 1x CO32-. Formula: Na2CO3. (2x 1+ = 2+, 1x 2- = 2-, neutral). (c) Fe2+ and SO42-: equal charge magnitudes. Ratio 1:1. Formula: FeSO4. No brackets needed as subscript is 1.", "type": "short"}, {"topic": "2", "ch": "2.2 Polyatomic Ions", "q": "What is a polyatomic ion?\n\nA. An ion with a very large charge\nB. An ion composed of more than one atom carrying an overall charge\nC. A neutral molecule\nD. An isotope with extra neutrons", "a": "Answer: B. An ion composed of more than one atom carrying an overall charge\n\nPolyatomic ions are composed of more than one atom and carry an overall charge. Most are anions (e.g. SO42-, NO3-, CO32-). Notable cation exceptions: NH4+ (ammonium) and H3O+ (hydronium).", "type": "mcq"}, {"topic": "2", "ch": "2.2 Polyatomic Ions", "q": "Which of the following is the correct formula for the sulfate ion?\n\nA. SO3-\nB. SO42-\nC. SO4-\nD. SO32-", "a": "Answer: B. SO42-\n\nThe sulfate anion has the formula SO42-. Do not confuse with sulfite (SO32-). The sulfate ion contains sulfur with 4 oxygen atoms and carries a 2- charge.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Polyatomic Ions", "q": "When writing a formula with a polyatomic ion subscript greater than 1, you must:\n\nA. Write the polyatomic ion twice\nB. Enclose the polyatomic ion in brackets before adding the subscript\nC. Just add the subscript to the last element\nD. Write the charge as a superscript", "a": "Answer: B. Enclose the polyatomic ion in brackets before adding the subscript\n\nWhen a subscript greater than 1 applies to a polyatomic ion, the entire ion must be enclosed in parentheses first. For example: Mg(NO3)2 not MgNO32, which would imply 2 oxygen atoms not 2 nitrate groups.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Polyatomic Ions", "q": "Name and give the formula for five common polyatomic anions. Include their charges.", "a": "Any five from: hydroxide OH-, nitrate NO3-, nitrite NO2-, sulfate SO42-, sulfite SO32-, carbonate CO32-, bicarbonate/hydrogen carbonate HCO3-, phosphate PO43-, acetate CH3COO-. The two common polyatomic cations are ammonium NH4+ and hydronium H3O+.", "type": "short"}, {"topic": "2", "ch": "2.2 Covalent Bonding", "q": "A covalent bond forms between:\n\nA. A metal and a non-metal\nB. Two metals\nC. Two non-metals that share a pair of electrons\nD. Positive and negative ions", "a": "Answer: C. Two non-metals that share a pair of electrons\n\nCovalent bonds form between non-metallic atoms that share valence electron pairs. Strong electrostatic attraction arises between the shared bonding electrons and the positive nuclei of both participating atoms.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Covalent Bonding", "q": "A triple bond contains:\n\nA. 1 pair of shared electrons\nB. 2 pairs of shared electrons\nC. 3 pairs of shared electrons\nD. 6 pairs of shared electrons", "a": "Answer: C. 3 pairs of shared electrons\n\nA triple bond involves three shared electron pairs (6 electrons total). It is the strongest type of covalent bond. Example: N2 (N triple bond N). More bonding pairs = stronger bond = more energy required to break.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Covalent Bonding", "q": "N2 requires extreme conditions (lightning or the Haber process) to react. Why?\n\nA. Nitrogen is radioactive\nB. The triple bond in N2 is extremely strong - enormous energy is required to break it\nC. N2 is too light to react\nD. N2 has ionic character", "a": "Answer: B. The triple bond in N2 is extremely strong - enormous energy is required to break it\n\nN2 has a triple covalent bond - three shared electron pairs. This is the strongest type of covalent bond, requiring a very large energy input to break. In nature, only lightning or volcanoes provide enough energy; industrially the Haber process uses high temperature and pressure.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Covalent Bonding", "q": "Which element is the central atom in a molecule of ammonia (NH3)?\n\nA. Hydrogen\nB. Nitrogen\nC. Either H or N\nD. The molecule has no central atom", "a": "Answer: B. Nitrogen\n\nThe central atom has the highest covalence (can form the most bonds) and usually has the lowest electronegativity among the non-hydrogen atoms. Nitrogen can form 3 bonds and has lower electronegativity than it would relative to H. H can only ever form 1 bond and is never central.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Covalent Bonding", "q": "The seven homonuclear diatomic molecules that exist at room temperature are:\n\nA. H2, N2, O2, F2, Cl2, Br2, I2\nB. H2, He2, N2, O2, F2, Cl2, Br2\nC. Na2, K2, O2, N2, F2, Cl2, I2\nD. H2, N2, O2, S2, F2, Cl2, Br2", "a": "Answer: A. H2, N2, O2, F2, Cl2, Br2, I2\n\nThe seven homonuclear diatomic molecules are H2, N2, O2, F2, Cl2, Br2, and I2. A useful mnemonic: HOFBrINCl (Have Oranges For Breakfast? It Needs Chlorine!). All exist as diatomic molecules at room temperature.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Covalent Bonding", "q": "State the 7 steps for drawing a Lewis structure, then apply them to draw the Lewis structure for carbon dioxide (CO2).", "a": "Steps: 1. Write formula. 2. Count total valence electrons. 3. Determine bonds needed. 4. Identify central atom (highest covalence, lowest EN). 5. Complete octets of outer atoms. 6. Place remaining electrons on central atom. 7. Check total electron count. CO2 application: 1. CO2. 2. C=4, O=6x2=12, total=16e-. 3. Each O needs 2 more, suggesting double bonds. 4. C is central (4 bonds possible, lower EN than O). 5. O=C=O with 2 lone pairs on each O. 6. C has no lone pairs. 7. 4 bonding pairs + 4 lone pairs = 16e-. Lewis structure: [lone pairs]O=C=O[lone pairs] with two double bonds.", "type": "short"}, {"topic": "2", "ch": "2.2 Bond Polarity", "q": "A non-polar covalent bond forms when:\n\nA. Two different non-metals bond\nB. The electronegativity difference between bonding atoms is zero or negligible\nC. One atom has a much higher electronegativity\nD. Electrons are fully transferred", "a": "Answer: B. The electronegativity difference between bonding atoms is zero or negligible\n\nNon-polar bonds occur when atoms have the same or negligible electronegativity difference. Electrons are shared equally with no partial charges. Examples: Cl2 (identical atoms), or C-H bonds (difference of 0.4, treated as non-polar).", "type": "mcq"}, {"topic": "2", "ch": "2.2 Bond Polarity", "q": "In HCl, Cl has electronegativity 3.0 and H has 2.1. Which atom carries the partial negative charge?\n\nA. Hydrogen - it has fewer electrons\nB. Chlorine - it attracts the shared electron pair more strongly\nC. Both atoms share the charge equally\nD. Neither - HCl is non-polar", "a": "Answer: B. Chlorine - it attracts the shared electron pair more strongly\n\nIn a polar bond, the MORE electronegative atom attracts the shared electrons toward itself, gaining a partial negative charge (delta-). Cl (3.0) is more electronegative than H (2.1), so Cl carries delta- and H carries delta+.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Bond Polarity", "q": "As the electronegativity difference between two bonding atoms increases, the bond:\n\nA. Becomes weaker\nB. Becomes more polar and takes on more ionic character\nC. Becomes a non-polar covalent bond\nD. Becomes shorter only", "a": "Answer: B. Becomes more polar and takes on more ionic character\n\nBond character exists on a spectrum: non-polar covalent (EN difference approx 0) -> polar covalent (moderate EN difference) -> ionic (large EN difference). Greater polarity means more ionic character - the bond electrons are increasingly concentrated on one atom.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Bond Polarity", "q": "Electron shielding DECREASES electronegativity because:\n\nA. It increases atomic radius\nB. Inner electrons reduce the effective nuclear pull experienced by outer/bonding electrons\nC. It removes protons from the nucleus\nD. It creates more electron pairs", "a": "Answer: B. Inner electrons reduce the effective nuclear pull experienced by outer/bonding electrons\n\nElectron shielding: inner shell electrons partially block the nucleus's attraction from reaching outer electrons. This reduces the effective nuclear charge felt by bonding electrons, decreasing the atom's ability to attract them (lower electronegativity).", "type": "mcq"}, {"topic": "2", "ch": "2.2 Bond Polarity", "q": "Compare a non-polar covalent bond and a polar covalent bond. Include: definition, cause, examples, and notation used.", "a": "Non-polar covalent bond: electrons shared equally between atoms of the same or very similar electronegativity. No partial charges or dipole. Example: Cl2 (identical atoms), C-H (EN difference 0.4). No special notation needed. Polar covalent bond: electrons shared unequally due to significant EN difference. The more electronegative atom gains partial negative charge (delta-); the other gets partial positive (delta+). Example: H-Cl - Cl is delta- (EN 3.0), H is delta+ (EN 2.1). Delta notation is used. The greater the EN difference, the greater the polarity and the more ionic character the bond has.", "type": "short"}, {"topic": "2", "ch": "2.2 Covalent Networks", "q": "In diamond, each carbon atom bonds to:\n\nA. Two adjacent carbon atoms\nB. Three adjacent carbon atoms\nC. Four adjacent carbon atoms\nD. Six adjacent carbon atoms", "a": "Answer: C. Four adjacent carbon atoms\n\nIn diamond, each carbon forms four covalent bonds in a tetrahedral arrangement with four adjacent carbon atoms. This creates an extremely strong 3D network in all directions - making diamond the hardest known natural substance.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Covalent Networks", "q": "How does graphite differ from diamond in its bonding?\n\nA. Graphite has ionic bonds; diamond has covalent bonds\nB. In graphite each C bonds to three adjacent atoms; the fourth electron is delocalised between layers\nC. Graphite has metallic bonds\nD. Graphite atoms have fewer electrons than diamond atoms", "a": "Answer: B. In graphite each C bonds to three adjacent atoms; the fourth electron is delocalised between layers\n\nIn graphite, each carbon bonds to THREE adjacent atoms (not four like diamond). The fourth valence electron is delocalised between the hexagonal layers. This gives graphite its electrical conductivity and allows layers to slide (making it soft and slippery).", "type": "mcq"}, {"topic": "2", "ch": "2.2 Covalent Networks", "q": "What is the empirical formula of silica (silicon dioxide)?\n\nA. Si2O\nB. SiO\nC. SiO2\nD. Si2O3", "a": "Answer: C. SiO2\n\nIn silica, each silicon forms 4 covalent bonds with oxygen atoms, but each oxygen is shared between 2 silicon atoms. The ratio is 1 Si to 2 O. Empirical formula: (SiO2)n. Similar structure to diamond.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Covalent Networks", "q": "Why do covalent network solids have very high melting points?\n\nA. They have strong ionic bonds throughout\nB. The entire solid is one continuous network of strong covalent bonds - enormous energy is needed to break enough bonds to disrupt the structure\nC. They have metallic character\nD. Their delocalised electrons provide extra stability", "a": "Answer: B. The entire solid is one continuous network of strong covalent bonds - enormous energy is needed to break enough bonds to disrupt the structure\n\nIn a covalent network, every atom is bonded to its neighbours with strong covalent bonds throughout the entire solid. There are no discrete molecules. To melt, countless covalent bonds must be broken simultaneously - requiring enormous thermal energy. Diamond melts at approximately 3500-4000 degrees C.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Covalent Networks", "q": "Silicon carbide (SiC) and boron carbide (B4C) are used in bulletproof vests because they are:\n\nA. Flexible and lightweight\nB. Extremely hard covalent network solids resistant to mechanical stress\nC. Good electrical conductors\nD. Malleable like metals", "a": "Answer: B. Extremely hard covalent network solids resistant to mechanical stress\n\nSilicon carbide and boron carbide are covalent network solids with extremely strong covalent bonds throughout. This makes them among the hardest materials known, able to withstand high mechanical stress without deforming - ideal for body armour and armoured vehicles.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Covalent Networks", "q": "Compare diamond and graphite as carbon allotropes. Address: bonding arrangement, electrical conductivity, hardness/softness, and give the empirical formula for both.", "a": "Both are allotropes of carbon (same element, different structures, same physical state). Diamond: each C bonds to 4 adjacent C atoms (tetrahedral, all 4 valence electrons in bonds). No free electrons - electrical insulator. Hardest known substance. Empirical formula: (C)n. Graphite: each C bonds to 3 adjacent C atoms in hexagonal layers. Fourth electron is delocalised between layers - excellent electrical conductor. Soft and slippery (layers slide). Empirical formula: (C)n. Key difference: diamond's 4-bond arrangement vs graphite's 3-bond + delocalised electron arrangement.", "type": "short"}, {"topic": "2", "ch": "2.2 Naming & Formulae", "q": "What is the systematic name for CO2?\n\nA. Carbon oxide\nB. Monocarbon dioxide\nC. Carbon dioxide\nD. Dicarbon oxide", "a": "Answer: C. Carbon dioxide\n\nCO2: C = 1 atom (mono- is omitted on the first atom), O = 2 atoms (di-). Second element gets '-ide'. Systematic name: carbon dioxide.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Naming & Formulae", "q": "What is the molecular formula for dinitrogen pentaoxide?\n\nA. NO5\nB. N2O\nC. N2O5\nD. NO2", "a": "Answer: C. N2O5\n\nDi- = 2, nitrogen = N, penta- = 5, oxide = O. Formula: N2O5.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Naming & Formulae", "q": "What is the systematic name for SF6?\n\nA. Sulfur hexafluoride\nB. Sulfur fluoride\nC. Monosulfur fluoride\nD. Hexasulfur fluoride", "a": "Answer: A. Sulfur hexafluoride\n\nS = 1 atom (mono- omitted on first atom), F = 6 atoms (hexa-). Second element gets '-ide': fluoride. Name: sulfur hexafluoride.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Naming & Formulae", "q": "What is the difference between a molecular formula and an empirical formula?\n\nA. They are the same thing\nB. Molecular formula gives the exact number of atoms in one molecule; empirical formula gives the simplest ratio\nC. Empirical formula only applies to gases\nD. Molecular formula is used only for ionic compounds", "a": "Answer: B. Molecular formula gives the exact number of atoms in one molecule; empirical formula gives the simplest ratio\n\nMolecular formula: exact atom count in one discrete molecule (e.g. H2O2). Empirical formula: simplest ratio of atoms/ions (e.g. HO for hydrogen peroxide). Covalent molecules use molecular formulae; ionic compounds and covalent networks use empirical formulae.", "type": "mcq"}, {"topic": "2", "ch": "2.2 Naming & Formulae", "q": "Name the following compounds and state whether each is a molecular formula or empirical formula: (a) N2O5, (b) (SiO2)n, (c) CCl4, (d) (C)n, (e) P4O10.", "a": "(a) N2O5 - dinitrogen pentaoxide - molecular formula (discrete molecule with fixed atom count). (b) (SiO2)n - silicon dioxide / silica - empirical formula (covalent network, n represents repeating units). (c) CCl4 - carbon tetrachloride - molecular formula. (d) (C)n - carbon (diamond or graphite) - empirical formula (covalent network). (e) P4O10 - tetraphosphorus decaoxide - molecular formula.", "type": "short"}];
const CH_COLORS = {"1.1 Properties of Materials": "#ff7744", "1.1 Nanomaterials": "#ffaa44", "1.1 Mixtures & Separation": "#fbbf24", "1.2 Atomic Structure": "#a78bfa", "1.2 Subshell Configurations": "#c084fc", "1.2 Spectra": "#e879f9", "1.2 Isotopes": "#f472b6", "1.3 Moles & Calculations": "#38bdf8", "1.4 Periodic Table": "#22d3ee", "1.4 Periodic Trends": "#34d399", "2.1 Types of Materials": "#4ade80", "2.2 Octet Rule & Ion Formation": "#86efac", "2.2 Bond Energy": "#fde68a", "2.2 Metallic Bonding": "#fb923c", "2.2 Ionic Bonding": "#f87171", "2.2 Empirical Formulae": "#60a5fa", "2.2 Polyatomic Ions": "#818cf8", "2.2 Covalent Bonding": "#a78bfa", "2.2 Bond Polarity": "#c084fc", "2.2 Covalent Networks": "#34d399", "2.2 Naming & Formulae": "#2dd4bf"};
const CH_ICONS  = {"1.1 Properties of Materials": "\u2697\ufe0f", "1.1 Nanomaterials": "\ud83d\udd2c", "1.1 Mixtures & Separation": "\ud83e\uddea", "1.2 Atomic Structure": "\u269b\ufe0f", "1.2 Subshell Configurations": "\ud83c\udf00", "1.2 Spectra": "\ud83c\udf08", "1.2 Isotopes": "\ud83d\udd22", "1.3 Moles & Calculations": "\ud83e\uddee", "1.4 Periodic Table": "\ud83d\udccb", "1.4 Periodic Trends": "\ud83d\udcc8", "2.1 Types of Materials": "\ud83c\udfd7\ufe0f", "2.2 Octet Rule & Ion Formation": "\u26a1", "2.2 Bond Energy": "\ud83d\udd0b", "2.2 Metallic Bonding": "\ud83d\udd29", "2.2 Ionic Bonding": "\ud83e\uddf2", "2.2 Empirical Formulae": "\ud83d\udd22", "2.2 Polyatomic Ions": "\ud83d\udd17", "2.2 Covalent Bonding": "\ud83e\udd1d", "2.2 Bond Polarity": "\u2696\ufe0f", "2.2 Covalent Networks": "\ud83d\udc8e", "2.2 Naming & Formulae": "\ud83c\udff7\ufe0f"};

let deck = [...ALL_CARDS];
let idx = 0;
let known = {};
let flipped = false;
let activeTopic = null;
let activeFilter = null;

function getBase() {
  let base = [...ALL_CARDS];
  if (activeTopic) base = base.filter(c => c.topic === activeTopic);
  if (activeFilter) base = base.filter(c => c.ch === activeFilter);
  return base;
}

function setTopic(topic) {
  activeTopic = topic; activeFilter = null;
  known = {}; idx = 0;
  deck = getBase();
  buildFilters(); buildDots(); showCard(); updateStrip(); updateProg();
  document.querySelectorAll('.topic-tab').forEach(b => b.classList.remove('on'));
  document.getElementById(topic ? 'tab'+topic : 'tabAll').classList.add('on');
}

function filterDeck(ch) {
  activeFilter = ch; known = {}; idx = 0;
  deck = getBase();
  buildDots(); showCard(); updateStrip(); updateProg();
  document.querySelectorAll('.filt').forEach(b => b.classList.toggle('on', b.dataset.ch === (ch||'all')));
}

function shuffleDeck() {
  for (let i = deck.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]] = [deck[j],deck[i]];
  }
  idx = 0; flipped = false; buildDots(); showCard(); updateProg();
}

function buildFilters() {
  const row = document.getElementById('filterRow');
  row.innerHTML = '';
  const base = activeTopic ? ALL_CARDS.filter(c => c.topic === activeTopic) : ALL_CARDS;
  const sections = [...new Set(base.map(c => c.ch))];
  const allBtn = document.createElement('button');
  allBtn.className = 'filt on'; allBtn.dataset.ch = 'all';
  allBtn.textContent = 'All (' + base.length + ')';
  allBtn.addEventListener('click', () => filterDeck(null));
  row.appendChild(allBtn);
  sections.forEach(ch => {
    const count = base.filter(c => c.ch === ch).length;
    const icon = CH_ICONS[ch] || '\u{1F4D6}';
    const b = document.createElement('button');
    b.className = 'filt'; b.dataset.ch = ch;
    b.textContent = icon + ' ' + ch + ' (' + count + ')';
    b.addEventListener('click', () => filterDeck(ch));
    row.appendChild(b);
  });
}

function buildDots() {
  const row = document.getElementById('dotRow');
  row.innerHTML = '';
  deck.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'mini-dot' + (i===idx?' current':'') + (known[i]===true?' known':'') + (known[i]===false?' unsure':'');
    d.addEventListener('click', (e) => { e.stopPropagation(); jumpTo(i); });
    row.appendChild(d);
  });
}

function updateDots() {
  document.querySelectorAll('.mini-dot').forEach((d, i) => {
    d.className = 'mini-dot' + (i===idx?' current':'') + (known[i]===true?' known':'') + (known[i]===false?' unsure':'');
  });
}

function showCard() {
  if (idx >= deck.length) { showWin(); return; }
  const card = deck[idx];
  const color = CH_COLORS[card.ch] || 'var(--accent)';
  flipped = false;
  document.getElementById('card3d').classList.remove('flipped');

  const chLabel = document.getElementById('chapterLabel');
  chLabel.style.animation = 'none'; chLabel.offsetHeight; chLabel.style.animation = '';
  const icon = CH_ICONS[card.ch] || '\u{1F4D6}';
  chLabel.innerHTML =
    '<div class="ch-icon">' + icon + '</div>' +
    '<div class="ch-badge" style="color:'+color+';border-color:'+color+'44;">' + card.ch + '</div>' +
    '<div class="ch-progress">' + (idx+1) + ' / ' + deck.length + '</div>';

  document.getElementById('cfTag').textContent = card.ch + ' · ' + (card.type === 'mcq' ? 'MCQ' : 'Short Answer');
  const tb = document.getElementById('cfTypeBadge');
  tb.className = 'type-badge ' + card.type;
  tb.textContent = card.type === 'mcq' ? 'MCQ' : 'Short Answer';

  const cfQ = document.getElementById('cfQuestion');
  if (card.type === 'mcq') {
    const parts = card.q.split('\n\n');
    const qText = parts[0];
    const optsText = parts.slice(1).join('\n\n');
    cfQ.innerHTML = qText.replace(/</g,'&lt;') + (optsText ? '<span class="opts-block">' + optsText.replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</span>' : '');
  } else {
    cfQ.textContent = card.q;
  }

  document.getElementById('cbAnswer').textContent = card.a;
  document.querySelector('.card-front').style.borderColor = color + '33';
  document.querySelector('.card-back').style.borderColor = color + '44';

  document.getElementById('navNum').textContent = idx+1;
  document.getElementById('navTotal').textContent = 'of ' + deck.length;
  document.getElementById('hdrCurrent').textContent = idx+1;
  document.getElementById('hdrTotal').textContent = deck.length;
  document.getElementById('btnPrev').disabled = idx===0;
  document.getElementById('btnNext').textContent = idx===deck.length-1 ? 'Finish ✓' : 'Next →';
  updateDots(); updateProg();
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card3d').classList.toggle('flipped', flipped);
}

function markKnown(e, yes) {
  e.stopPropagation(); known[idx] = yes;
  updateStrip(); updateDots();
  setTimeout(() => nextCard(), 260);
}

function nextCard() { if (idx < deck.length-1) { idx++; showCard(); } else { showWin(); } }
function prevCard() { if (idx > 0) { idx--; showCard(); } }
function jumpTo(i) { idx = i; showCard(); }

function updateStrip() {
  const k = Object.values(known).filter(v=>v===true).length;
  const u = Object.values(known).filter(v=>v===false).length;
  const t = deck.length;
  document.getElementById('ksKnown').textContent = k;
  document.getElementById('ksUnsure').textContent = u;
  document.getElementById('ksUnpractised').textContent = t-k-u;
  document.getElementById('ksBarFill').style.width = (k/t*100)+'%';
  document.getElementById('hdrKnown').textContent = k;
}

function updateProg() {
  document.getElementById('progFill').style.width = (Object.keys(known).length/deck.length*100)+'%';
}

function showWin() {
  document.getElementById('cardScene').style.display = 'none';
  document.querySelectorAll('.nav-row').forEach(r => r.style.display='none');
  const k = Object.values(known).filter(v=>v===true).length;
  const u = Object.values(known).filter(v=>v===false).length;
  const pct = Math.round(k/deck.length*100);
  document.getElementById("winSub").textContent = pct>=80 ? "Excellent! Strong recall across these topics." : pct>=60 ? "Good work — review the ones you missed." : "Keep practising — you'll get there!";
  document.getElementById('winStats').innerHTML =
    '<div class="win-stat"><div class="win-stat-val" style="color:#34d399">'+k+'</div><div class="win-stat-lbl">Got it</div></div>'+
    '<div class="win-stat"><div class="win-stat-val" style="color:#f87171">'+u+'</div><div class="win-stat-lbl">Still learning</div></div>'+
    '<div class="win-stat"><div class="win-stat-val" style="color:var(--accent)">'+pct+'%</div><div class="win-stat-lbl">Success rate</div></div>';
  document.getElementById('winState').classList.add('show');
  document.getElementById('progFill').style.width = '100%';
}

function restartDeck() {
  known = {}; idx = 0;
  document.getElementById('winState').classList.remove('show');
  document.getElementById('cardScene').style.display = '';
  document.querySelectorAll('.nav-row').forEach(r => r.style.display='');
  updateStrip(); buildDots(); showCard();
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); if(!flipped)flipCard();else nextCard(); }
  if (e.key==='ArrowLeft') { e.preventDefault(); prevCard(); }
  if (e.key==='1'&&flipped) markKnown({stopPropagation:()=>{}}, true);
  if (e.key==='2'&&flipped) markKnown({stopPropagation:()=>{}}, false);
});

buildFilters(); buildDots(); showCard(); updateStrip();
document.getElementById('btnShuffle').addEventListener('click', shuffleDeck);
document.getElementById('card3d').addEventListener('click', flipCard);
document.getElementById('btnGot').addEventListener('click', (e) => { e.stopPropagation(); markKnown(e, true); });
document.getElementById('btnNope').addEventListener('click', (e) => { e.stopPropagation(); markKnown(e, false); });
document.getElementById('btnPrev').addEventListener('click', prevCard);
document.getElementById('btnNext').addEventListener('click', nextCard);
document.getElementById('btnRestart').addEventListener('click', restartDeck);
document.getElementById('tabAll').addEventListener('click', () => setTopic(null));
document.getElementById('tab1').addEventListener('click', () => setTopic('1'));
document.getElementById('tab2').addEventListener('click', () => setTopic('2'));
</script>
</body>
</html>
