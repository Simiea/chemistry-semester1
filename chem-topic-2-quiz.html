<style>
  :root{--bg:#0b0f1a;--surface:#111827;--surface2:#1a2235;--border:#1f2d45;--border2:#2d3f5c;--text:#e4eaf4;--muted:#6b7fa0;--muted2:#3a4d6a;--accent:#4ade80;--correct:#34d399;--correct-bg:rgba(52,211,153,0.1);--correct-bd:rgba(52,211,153,0.35);--wrong:#f87171;--wrong-bg:rgba(248,113,113,0.1);--wrong-bd:rgba(248,113,113,0.35);}
  *{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}
  .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .hdr-left{display:flex;align-items:center;gap:0.75rem;}.hdr-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .hdr-title{font-weight:800;font-size:0.9rem;}.hdr-sub{font-size:0.75rem;color:var(--muted);margin-top:0.1rem;}
  .score-box{font-family:'Fira Code',monospace;font-size:0.8rem;color:var(--muted);}.score-box span{color:var(--accent);}
  .wrap{max-width:780px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  .tabs{display:flex;gap:0.4rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.3rem;width:fit-content;margin-bottom:2rem;}
  .tab{padding:0.45em 1.1em;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .tab.on{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}

  .prog-label{font-family:'Fira Code',monospace;font-size:0.7rem;color:var(--muted2);margin-bottom:0.5rem;}
  .fc-wrap{perspective:1200px;margin-bottom:1.5rem;}
  .fc{width:100%;min-height:230px;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(.4,0,.2,1);cursor:pointer;}
  .fc.flipped{transform:rotateY(180deg);}
  .fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;border:1px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;background:var(--surface);}
  .fc-back{transform:rotateY(180deg);background:var(--surface2);}
  .fc-tag{font-family:'Fira Code',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:0.75rem;}
  .fc-q{font-size:1.05rem;font-weight:700;line-height:1.45;}
  .fc-a{font-size:0.9rem;color:var(--correct);line-height:1.65;max-width:560px;}
  .fc-hint{font-size:0.75rem;color:var(--muted2);margin-top:0.5rem;font-style:italic;}
  .fc-nav{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:2rem;}
  .fc-btn{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:0.6em 1.4em;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.83rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .fc-btn:hover{border-color:var(--accent);color:var(--accent);}
  .fc-count{font-family:'Fira Code',monospace;font-size:0.78rem;color:var(--muted);}
  .fc-knew{display:flex;gap:0.5rem;justify-content:center;margin-bottom:2.5rem;}
  .btn-knew{padding:0.5em 1.4em;border-radius:8px;border:1px solid;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.15s;}
  .btn-yes{background:var(--correct-bg);border-color:var(--correct-bd);color:var(--correct);}.btn-yes:hover{background:rgba(52,211,153,0.2);}
  .btn-no{background:var(--wrong-bg);border-color:var(--wrong-bd);color:var(--wrong);}.btn-no:hover{background:rgba(248,113,113,0.2);}
  .q-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.75rem;margin-bottom:1.25rem;}
  .q-num{font-family:'Fira Code',monospace;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:0.6rem;}
  .q-text{font-size:0.97rem;font-weight:600;line-height:1.55;margin-bottom:1.1rem;}
  .opts{display:flex;flex-direction:column;gap:0.5rem;}
  .opt{padding:0.75rem 1rem;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:0.88rem;color:var(--muted);transition:all 0.15s;display:flex;align-items:flex-start;gap:0.75rem;line-height:1.5;}
  .opt:hover:not(.locked){border-color:var(--border2);color:var(--text);}
  .opt.chosen{border-color:rgba(139,92,246,0.5);background:rgba(139,92,246,0.1);color:var(--text);}
  .opt.correct{border-color:var(--correct-bd);background:var(--correct-bg);color:var(--correct);}
  .opt.wrong{border-color:var(--wrong-bd);background:var(--wrong-bg);color:var(--wrong);}
  .opt-letter{font-family:'Fira Code',monospace;font-size:0.75rem;font-weight:500;flex-shrink:0;margin-top:0.1rem;}
  .q-feedback{margin-top:1rem;padding:0.75rem 1rem;border-radius:10px;font-size:0.85rem;line-height:1.55;display:none;border:1px solid;}
  .q-feedback.show{display:block;}.q-feedback.ok{background:var(--correct-bg);border-color:var(--correct-bd);color:var(--correct);}.q-feedback.bad{background:var(--wrong-bg);border-color:var(--wrong-bd);color:var(--wrong);}
  .submit-row{display:flex;justify-content:flex-end;margin-top:1rem;}
  .btn-check{padding:0.55em 1.5em;border-radius:8px;border:none;background:var(--accent);color:#000;font-weight:700;font-size:0.85rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
  .results{display:none;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:2rem;text-align:center;margin-top:2rem;}
  .results.show{display:block;}.res-score{font-size:3rem;font-weight:800;color:var(--accent);line-height:1;}
  .res-label{color:var(--muted);font-size:0.9rem;margin-top:0.4rem;margin-bottom:1.5rem;}
  .btn-reset{padding:0.6em 1.8em;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-weight:600;font-size:0.85rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
  .btn-reset:hover{border-color:var(--accent);color:var(--accent);}
  .hidden{display:none;}

<script>
const cards = [{"q": "What are the four types of solid materials? Give an example of each.", "a": "1. Metallic (e.g. copper) \u2014 metal atoms only. 2. Ionic (e.g. NaCl) \u2014 metal + non-metal. 3. Covalent molecular (e.g. iodine) \u2014 discrete molecules. 4. Covalent network (e.g. diamond) \u2014 continuous covalent lattice.", "hint": ""}, {"q": "What is an intramolecular force (primary bond)?", "a": "A force that forms between atoms or ions within a material. The three types are metallic, ionic, and covalent bonds.", "hint": ""}, {"q": "Rank the four solid types by melting point from highest to lowest.", "a": "Covalent network (highest, e.g. diamond 3500\u00b0C) > Metallic (e.g. Ag 961\u00b0C) > Ionic (e.g. NaCl 801\u00b0C) > Covalent molecular (lowest, e.g. I2 114\u00b0C).", "hint": ""}, {"q": "Which types of materials conduct electricity in solid form? Explain why.", "a": "Only metallic solids conduct in solid form \u2014 delocalised electrons are free to move. Ionic solids have fixed ions. Covalent molecular and network solids have no free charged particles.", "hint": "Exception: graphite"}, {"q": "Why is graphite an exceptional covalent network solid regarding conductivity?", "a": "Each carbon in graphite bonds to only three adjacent atoms; the fourth valence electron is delocalised and can move freely between layers \u2014 giving graphite excellent electrical conductivity, unlike most covalent networks.", "hint": ""}, {"q": "When do molten and aqueous ionic compounds conduct electricity?", "a": "When ionic compounds are molten or dissolved in water, ions are free to move and carry charge \u2014 they become electrolytes and conduct electricity.", "hint": ""}, {"q": "State the octet rule.", "a": "Most atoms prefer to have 8 valence electrons in their outer shell. They achieve this by gaining, losing, or sharing electrons. Noble gases (Group VIII) already have a full octet and are non-reactive.", "hint": ""}, {"q": "What is a cation? How does it form and what is its charge?", "a": "A positively charged ion formed when a metal atom LOSES valence electrons. The charge equals the number of electrons lost (= Group number for Groups I-III). E.g. Na loses 1e- to form Na+.", "hint": "Metal loses electrons"}, {"q": "What is an anion? How does it form and what is its charge?", "a": "A negatively charged ion formed when a non-metal atom GAINS electrons. The charge equals the electrons gained = (8 - Group number). E.g. Cl gains 1e- to form Cl-. Suffix changes to '-ide'.", "hint": "Non-metal gains electrons"}, {"q": "What is ionisation energy? How does it trend across a period and down a group?", "a": "The minimum energy required to remove an electron from an atom. Increases across a period (stronger nuclear attraction). Decreases down a group (electrons further from nucleus, weaker attraction).", "hint": ""}, {"q": "Is bond formation exothermic or endothermic? What about bond breaking?", "a": "Bond FORMATION releases energy (exothermic). Bond BREAKING requires energy (endothermic). Whether the overall reaction is exothermic or endothermic depends on which is greater.", "hint": "Form = release; Break = require"}, {"q": "What is activation energy?", "a": "The minimum energy that must be provided to start a chemical reaction. It is required to break existing bonds before new bonds can form. Measured in joules per mole (J/mol).", "hint": ""}, {"q": "Describe metallic bonding. What holds the lattice together?", "a": "Metal atoms release valence electrons which become delocalised \u2014 shared between all neighbouring atoms. This creates a sea of delocalised electrons surrounding positive metal cations. The lattice is held together by strong electrostatic attraction between the positive cations and the sea of delocalised electrons.", "hint": "Sea of electrons"}, {"q": "Why are metals malleable and ductile?", "a": "Malleable: layers of cations can slide over each other under compressive stress, but the delocalised electrons maintain attraction \u2014 bonds do NOT break. Ductile: same principle under tensile stress \u2014 the lattice stretches without breaking. Alloys are HARDER because different-sized atoms distort the lattice, requiring more force.", "hint": ""}, {"q": "Why do metals conduct electricity and heat?", "a": "Electrical: delocalised electrons move freely toward positive electrode \u2014 this IS an electric current. Thermal: free electrons vibrate more rapidly when heated, colliding and transferring energy rapidly throughout the material.", "hint": "Delocalised electrons"}, {"q": "What makes a metal's melting point higher?", "a": "Two factors: (1) Greater cation charge magnitude \u2014 stronger electrostatic attraction. (2) Smaller atomic radius \u2014 cations are closer to delocalised electrons, increasing attraction strength.", "hint": "Charge and radius"}, {"q": "What are the two steps in forming an ionic bond?", "a": "Step 1: Electron transfer \u2014 metal loses electrons (cation) and non-metal gains them (anion). Step 2: Ionic bond forms \u2014 electrostatic attraction between the oppositely charged ions. Energy is released in step 2.", "hint": "Transfer then attract"}, {"q": "Why are ionic compounds hard but brittle?", "a": "Hard: strong 3D ionic lattice with strong electrostatic forces. Brittle: when stress shifts layers, like charges align \u2192 repulsion causes the crystal to SHATTER along a smooth plane. Unlike metals, ions cannot slide without alignment issues.", "hint": ""}, {"q": "What is the procedure for writing an empirical formula for an ionic compound?", "a": "1. Identify ion charges. 2. If equal charges: 1:1 ratio. 3. If unequal: find LCM of charges; subscripts = LCM divided by each charge. 4. Write cation first, anion second. Use brackets for polyatomic ions when subscript >1.", "hint": ""}, {"q": "Write the formula for aluminium oxide.", "a": "Al3+ and O2-. LCM = 6. Need 2x Al3+ and 3x O2-. Formula: Al2O3.", "hint": "LCM = 6"}, {"q": "What are polyatomic ions? Give 5 examples.", "a": "Ions composed of more than one atom with an overall charge. Examples: OH- (hydroxide), NO3- (nitrate), SO42- (sulfate), CO32- (carbonate), PO43- (phosphate), NH4+ (ammonium), H3O+ (hydronium).", "hint": "Most are anions"}, {"q": "How does a single, double, and triple covalent bond differ?", "a": "Single: 1 shared pair (2 electrons) \u2014 weakest. Double: 2 shared pairs (4 electrons) \u2014 intermediate. Triple: 3 shared pairs (6 electrons) \u2014 strongest. As bond order increases, bond strength increases and more energy is required to break it.", "hint": ""}, {"q": "How do you draw a Lewis structure? (List the steps)", "a": "1. Write formula. 2. Count total valence electrons. 3. Determine bonds needed (electrons each atom needs for octet). 4. Identify central atom (highest covalence, lowest electronegativity). 5. Complete outer atom octets. 6. Place remaining electrons on central atom. 7. Check total electron count.", "hint": ""}, {"q": "What is electronegativity? What element has the highest value?", "a": "Electronegativity is the ability of an atom to attract bonding electrons toward itself (Pauling scale 0-4). Fluorine has the highest value (4.0). Francium and caesium have the lowest (0.7).", "hint": "F = 4.0"}, {"q": "What is a non-polar covalent bond? Give an example.", "a": "A covalent bond where electrons are shared EQUALLY \u2014 same or negligible electronegativity difference. Example: Cl2 (identical atoms). Also C-H bond (difference 0.4 \u2014 negligible, treated as non-polar).", "hint": ""}, {"q": "What is a polar covalent bond? Give an example.", "a": "A covalent bond where electrons are shared UNEQUALLY due to different electronegativities. The more electronegative atom gets partial negative charge (delta-), the other gets partial positive (delta+). Example: HCl \u2014 Cl (3.0) is delta-, H (2.1) is delta+.", "hint": "HCl example"}, {"q": "Describe the spectrum from non-polar covalent to ionic.", "a": "Non-polar covalent (delta EN = 0) -> Polar covalent (moderate delta EN) -> Ionic (large delta EN). As polarity increases, the bond has more ionic character. There is no sharp boundary.", "hint": ""}, {"q": "What is the structure of diamond and why is it so hard?", "a": "Each carbon atom forms FOUR covalent bonds to four adjacent carbon atoms in a tetrahedral 3D network. Extremely strong covalent bonds throughout the entire structure \u2014 diamond is the hardest known substance. No free electrons so it is an electrical insulator.", "hint": "4 bonds per C"}, {"q": "How does graphite's structure differ from diamond?", "a": "In graphite, each carbon bonds to THREE adjacent carbon atoms in hexagonal layers. The fourth valence electron is DELOCALISED between layers. This gives graphite: conductivity (delocalised electrons), softness/slipperiness (layers slide), and layered hexagonal structure.", "hint": "3 bonds + 1 delocalised"}, {"q": "How are covalent molecules named? Give the example: N2O5.", "a": "Use Greek prefixes for atom counts + '-ide' for second element. Central atom first. Mono- omitted on first atom. Example: N2O5 = dinitrogen pentaoxide (di=2 N, penta=5 O).", "hint": "Greek prefixes"}, {"q": "What is the difference between a molecular formula and an empirical formula?", "a": "Molecular formula: exact number of each atom in one molecule (e.g. H2O). Used for covalent molecules. Empirical formula: simplest ratio of atoms/ions. Used for ionic compounds and covalent networks (e.g. (SiO2)n, NaCl).", "hint": ""}, {"q": "Why do covalent network solids have very high melting points?", "a": "The entire solid is one continuous network of strong covalent bonds. A huge amount of thermal energy is required to break enough bonds to disrupt the structure. Diamond has a melting point of approximately 4000 degrees C.", "hint": "Continuous covalent bonds"}];
const mcqs = [{"q": "Which type of solid has the highest melting point?", "opts": ["Covalent molecular", "Ionic", "Metallic", "Covalent network"], "ans": 3, "exp": "Covalent networks have the strongest bonds (very strong covalent bonds throughout the entire solid). Diamond melts at ~3500\u00b0C, much higher than metallic or ionic solids."}, {"q": "Which materials conduct electricity in solid form?", "opts": ["Ionic solids", "Covalent molecular solids", "Metallic solids", "All of the above"], "ans": 2, "exp": "Only metallic solids conduct electricity in solid form \u2014 due to delocalised electrons that are free to move. Ionic solids have fixed ions in solid form; covalent solids have no free charges."}, {"q": "When an ionic compound is dissolved in water, it conducts electricity because:", "opts": ["Electrons become free to move", "The ions are free to move and carry charge", "The compound breaks into atoms", "Water becomes a metal"], "ans": 1, "exp": "Dissolving releases the ions from their fixed lattice positions. These free ions can move through the solution and carry electric charge \u2014 the compound acts as an electrolyte."}, {"q": "A sodium atom (Group I) forms an ion by:", "opts": ["Gaining 1 electron to form Na-", "Losing 1 electron to form Na+", "Sharing 1 electron", "Gaining 7 electrons"], "ans": 1, "exp": "Group I metals have 1 valence electron. By losing it, sodium achieves a noble gas configuration (2,8) and forms Na+ \u2014 a positively charged cation."}, {"q": "Which of the following correctly describes an anion?", "opts": ["A positively charged metal ion", "A negatively charged ion formed when a non-metal gains electrons", "A neutral atom with a full outer shell", "A metal that has lost electrons"], "ans": 1, "exp": "Anions are negatively charged ions formed when non-metal atoms gain electrons. The suffix of the element name changes to '-ide' (e.g. chlorine \u2192 chloride)."}, {"q": "What is the empirical formula for aluminium oxide? (Al3+, O2-)", "opts": ["AlO", "Al2O3", "Al3O2", "AlO2"], "ans": 1, "exp": "Al3+ and O2- \u2014 LCM of 3 and 2 is 6. Need 2x Al3+ (6+) and 3x O2- (6-). Formula: Al2O3."}, {"q": "What holds the metallic lattice together?", "opts": ["Covalent bonds between metal atoms", "Ionic bonds between positive and negative ions", "Electrostatic attraction between positive metal cations and delocalised electrons", "Hydrogen bonds between layers"], "ans": 2, "exp": "Metallic bonding: the electrostatic attraction between the positively charged metal cations and the sea of delocalised electrons holds the lattice together."}, {"q": "Why are metals malleable but ionic crystals are brittle?", "opts": ["Metals have weaker bonds", "In metals, layers can slide without breaking bonds; in ionic solids, shifting layers aligns like charges causing repulsion and shattering", "Ionic solids have no bonds", "Metals contain more electrons"], "ans": 1, "exp": "In metals, delocalised electrons maintain attraction as layers slide \u2014 bonds don't break. In ionic solids, when layers shift, like-charged ions (+ or -) align next to each other, creating repulsion that causes the crystal to shatter."}, {"q": "A triple covalent bond contains:", "opts": ["1 pair of shared electrons", "2 pairs of shared electrons", "3 pairs of shared electrons", "3 ionic bonds"], "ans": 2, "exp": "A triple bond involves three shared electron pairs (6 electrons total). It is the strongest type of covalent bond, as in N2 (N\u2261N). More bonding pairs = stronger bond = more energy required to break."}, {"q": "In a polar covalent bond, the partial negative charge (delta-) is on:", "opts": ["The less electronegative atom", "The central atom always", "The more electronegative atom", "The atom with more protons"], "ans": 2, "exp": "In a polar bond, the more electronegative atom attracts the shared electron pair more strongly toward itself, gaining a partial negative charge (delta-). The less electronegative atom becomes partial positive (delta+)."}, {"q": "Which of the following is a polyatomic ion?", "opts": ["Na+", "Cl-", "SO42-", "Fe2+"], "ans": 2, "exp": "SO42- (sulfate) is a polyatomic ion \u2014 it contains more than one atom (S and O) with an overall charge. Na+, Cl-, and Fe2+ are monoatomic ions derived from single atoms."}, {"q": "Why is graphite a conductor of electricity but diamond is not?", "opts": ["Graphite has more carbon atoms", "In graphite, each carbon has a delocalised fourth electron that can move freely; in diamond all 4 electrons are bonded", "Diamond has ionic bonds", "Graphite contains metal impurities"], "ans": 1, "exp": "In graphite, each C forms only 3 covalent bonds; the 4th electron is delocalised and free to move between layers. In diamond, all 4 valence electrons are in covalent bonds \u2014 none are free to carry charge."}, {"q": "The formula for magnesium nitrate is:", "opts": ["MgNO3", "Mg(NO3)2", "Mg2NO3", "Mg2(NO3)3"], "ans": 1, "exp": "Mg2+ and NO3-. Charge on Mg2+ is 2+; charge on NO3- is 1-. Need 2x NO3- to balance. Formula: Mg(NO3)2. Brackets are used because the subscript 2 applies to the whole polyatomic ion NO3-."}, {"q": "The systematic name for CO2 is:", "opts": ["Carbon oxide", "Monocarbon dioxide", "Carbon dioxide", "Dicarbon oxide"], "ans": 2, "exp": "CO2: C = 1 atom (mono- omitted on the first atom), O2 = 2 atoms (di-). Second element gets '-ide'. Name: carbon dioxide."}, {"q": "What is the empirical formula for silica (covalent network of Si and O)?", "opts": ["SiO", "Si2O", "SiO2", "Si2O4"], "ans": 2, "exp": "In silica, each Si forms 4 bonds with O atoms, but each O is shared between 2 Si atoms. The ratio is 1 Si : 2 O. Empirical formula: (SiO2)n. This is an empirical formula, not a molecular formula, because the network extends indefinitely."}, {"q": "Which factor does NOT affect the melting point of a metallic solid?", "opts": ["Charge of the metal cation", "Atomic radius of the metal", "Colour of the metal", "Arrangement of atoms in the lattice"], "ans": 2, "exp": "Colour has no effect on melting point. Melting point is determined by the strength of electrostatic attraction, which depends on cation charge (higher charge = higher mp) and atomic radius (smaller radius = closer to electrons = higher mp)."}, {"q": "Bond formation always:", "opts": ["Requires energy", "Releases energy", "Has no energy change", "Only occurs at high temperatures"], "ans": 1, "exp": "Bond formation ALWAYS releases energy. This is because atoms reach a lower, more stable energy state when bonds form. Conversely, breaking bonds always requires energy input."}, {"q": "Iron can form Fe2+ and Fe3+ because:", "opts": ["Iron has two different atomic numbers", "Transition metals can have multiple oxidation states due to several electrons with similar ionisation energies", "Iron is a non-metal", "It depends on temperature only"], "ans": 1, "exp": "Transition metals have several electrons with similar ionisation energies in their d and s subshells. Under different conditions, different numbers of electrons can be released, giving multiple possible oxidation states (e.g. Fe2+ and Fe3+ for iron)."}, {"q": "What makes alloys harder than pure metals?", "opts": ["Alloys contain more electrons", "Different-sized atoms in alloys distort the regular lattice, requiring greater force for layers to slide", "Alloys have ionic bonds", "Alloys have higher melting points"], "ans": 1, "exp": "In an alloy, atoms of different sizes are present in the lattice. This distorts the regular arrangement, making it harder for layers to slide over each other \u2014 increasing the force (hardness) required to deform the material."}, {"q": "Which molecule has a triple covalent bond?", "opts": ["H2O", "O2", "N2", "CH4"], "ans": 2, "exp": "N2 (nitrogen gas) has a triple covalent bond (N\u2261N) \u2014 three pairs of electrons are shared between two nitrogen atoms. This makes it very strong and requires significant energy to break (relevant to the Haber process)."}, {"q": "For the reaction Na -> Na+ + e-, the enthalpy change is +496 kJ/mol. This reaction is:", "opts": ["Exothermic \u2014 energy is released", "Endothermic \u2014 energy is absorbed", "Neutral \u2014 no energy change", "Catalytic \u2014 no energy needed"], "ans": 1, "exp": "A positive enthalpy change (\u0394H = +496 kJ/mol) means the products have higher energy than the reactants \u2014 energy is ABSORBED from the surroundings. This is endothermic. Removing an electron from a metal requires energy input."}];
let fcIdx=0,fcKnown=new Set(),answered=new Array(mcqs.length).fill(null),correct=0;
function setMode(m){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));event.target.classList.add('on');document.getElementById('flashMode').classList.toggle('hidden',m!=='flash');document.getElementById('mcqMode').classList.toggle('hidden',m!=='mcq');if(m==='mcq')buildMCQ();}
function showCard(){const c=cards[fcIdx];document.getElementById('fcQ').textContent=c.q;document.getElementById('fcA').textContent=c.a;document.getElementById('fcHint').textContent=c.hint?'Hint: '+c.hint:'';document.getElementById('fcLabel').textContent='Card '+(fcIdx+1)+' of '+cards.length;document.getElementById('fcProg').style.width=(((fcIdx+1)/cards.length)*100)+'%';document.getElementById('fcCount').textContent=fcKnown.size+' known';document.getElementById('fc').classList.remove('flipped');}
function flipCard(){document.getElementById('fc').classList.toggle('flipped');}
function nextCard(){if(fcIdx<cards.length-1){fcIdx++;showCard();}}
function prevCard(){if(fcIdx>0){fcIdx--;showCard();}}
function markCard(k){if(k)fcKnown.add(fcIdx);else fcKnown.delete(fcIdx);nextCard();}
function buildMCQ(){const c=document.getElementById('mcqQuestions');if(c.children.length>0)return;mcqs.forEach(function(q,qi){const d=document.createElement('div');d.className='q-card';const optsHtml=q.opts.map(function(o,oi){return '<div class="opt" id="opt'+qi+'_'+oi+'" onclick="choose('+qi+','+oi+')"><span class="opt-letter">'+['A','B','C','D'][oi]+'</span><span>'+o+'</span></div>';}).join('');d.innerHTML='<div class="q-num">Question '+(qi+1)+' of '+mcqs.length+'</div><div class="q-text">'+q.q+'</div><div class="opts" id="opts'+qi+'">'+optsHtml+'</div><div class="q-feedback" id="fb'+qi+'"></div>';c.appendChild(d);});}
function choose(qi,oi){if(answered[qi]!==null)return;document.querySelectorAll('#opts'+qi+' .opt').forEach(function(o){o.classList.remove('chosen');});document.getElementById('opt'+qi+'_'+oi).classList.add('chosen');answered[qi]=oi;}
function submitQuiz(){correct=0;mcqs.forEach(function(q,qi){const sel=answered[qi];if(sel===null)return;const opts=document.querySelectorAll('#opts'+qi+' .opt');opts.forEach(function(o){o.classList.add('locked');});opts[q.ans].classList.add('correct');const fb=document.getElementById('fb'+qi);if(sel===q.ans){correct++;fb.className='q-feedback show ok';fb.textContent='Correct! '+q.exp;}else{opts[sel].classList.add('wrong');fb.className='q-feedback show bad';fb.textContent='Incorrect. '+q.exp;}});document.getElementById('scoreDisp').textContent=correct+' / '+mcqs.length;const res=document.getElementById('results');res.classList.add('show');document.getElementById('resScore').textContent=correct+' / '+mcqs.length;const pct=Math.round((correct/mcqs.length)*100);document.getElementById('resLabel').textContent=pct>=80?'Excellent work!':pct>=60?'Good effort - review the ones you missed.':'Keep studying - you will get there!';res.scrollIntoView({behavior:'smooth'});}
function resetQuiz(){answered=new Array(mcqs.length).fill(null);correct=0;document.getElementById('mcqQuestions').innerHTML='';document.getElementById('results').classList.remove('show');document.getElementById('scoreDisp').textContent='0 / 0';buildMCQ();}
showCard();
</script>
