<style>
  :root{--bg:#0b0f1a;--surface:#111827;--surface2:#1a2235;--border:#1f2d45;--border2:#2d3f5c;--text:#e4eaf4;--muted:#6b7fa0;--muted2:#3a4d6a;--accent:#ff7744;--correct:#34d399;--correct-bg:rgba(52,211,153,0.1);--correct-bd:rgba(52,211,153,0.35);--wrong:#f87171;--wrong-bg:rgba(248,113,113,0.1);--wrong-bd:rgba(248,113,113,0.35);}
  *{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}
  .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .hdr-left{display:flex;align-items:center;gap:0.75rem;}.hdr-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .hdr-title{font-weight:800;font-size:0.9rem;}.hdr-sub{font-size:0.75rem;color:var(--muted);margin-top:0.1rem;}
  .score-box{font-family:'Fira Code',monospace;font-size:0.8rem;color:var(--muted);}.score-box span{color:var(--accent);}
  .wrap{max-width:780px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  .tabs{display:flex;gap:0.4rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.3rem;width:fit-content;margin-bottom:2rem;}
  .tab{padding:0.45em 1.1em;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .tab.on{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
  .prog-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:1.5rem;overflow:hidden;}
  .prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s ease;}
  .prog-label{font-family:'Fira Code',monospace;font-size:0.7rem;color:var(--muted2);margin-bottom:0.5rem;}
  .fc-wrap{perspective:1200px;margin-bottom:1.5rem;}
  .fc{width:100%;min-height:230px;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(.4,0,.2,1);cursor:pointer;}
  .fc.flipped{transform:rotateY(180deg);}
  .fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;border:1px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;background:var(--surface);}
  .fc-back{transform:rotateY(180deg);background:var(--surface2);}
  .fc-tag{font-family:'Fira Code',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:0.75rem;}
  .fc-q{font-size:1.05rem;font-weight:700;line-height:1.45;}
  .fc-a{font-size:0.9rem;color:var(--correct);line-height:1.65;max-width:560px;}
  .fc-hint{font-size:0.75rem;color:var(--muted2);margin-top:0.5rem;font-style:italic;}
  .fc-nav{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:2rem;}
  .fc-btn{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:0.6em 1.4em;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.83rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .fc-btn:hover{border-color:var(--accent);color:var(--accent);}
  .fc-count{font-family:'Fira Code',monospace;font-size:0.78rem;color:var(--muted);}
  .fc-knew{display:flex;gap:0.5rem;justify-content:center;margin-bottom:2.5rem;}
  .btn-knew{padding:0.5em 1.4em;border-radius:8px;border:1px solid;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.15s;}
  .btn-yes{background:var(--correct-bg);border-color:var(--correct-bd);color:var(--correct);}.btn-yes:hover{background:rgba(52,211,153,0.2);}
  .btn-no{background:var(--wrong-bg);border-color:var(--wrong-bd);color:var(--wrong);}.btn-no:hover{background:rgba(248,113,113,0.2);}
  .q-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.75rem;margin-bottom:1.25rem;}
  .q-num{font-family:'Fira Code',monospace;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:0.6rem;}
  .q-text{font-size:0.97rem;font-weight:600;line-height:1.55;margin-bottom:1.1rem;}
  .opts{display:flex;flex-direction:column;gap:0.5rem;}
  .opt{padding:0.75rem 1rem;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:0.88rem;color:var(--muted);transition:all 0.15s;display:flex;align-items:flex-start;gap:0.75rem;line-height:1.5;}
  .opt:hover:not(.locked){border-color:var(--border2);color:var(--text);}
  .opt.chosen{border-color:rgba(139,92,246,0.5);background:rgba(139,92,246,0.1);color:var(--text);}
  .opt.correct{border-color:var(--correct-bd);background:var(--correct-bg);color:var(--correct);}
  .opt.wrong{border-color:var(--wrong-bd);background:var(--wrong-bg);color:var(--wrong);}
  .opt-letter{font-family:'Fira Code',monospace;font-size:0.75rem;font-weight:500;flex-shrink:0;margin-top:0.1rem;}
  .q-feedback{margin-top:1rem;padding:0.75rem 1rem;border-radius:10px;font-size:0.85rem;line-height:1.55;display:none;border:1px solid;}
  .q-feedback.show{display:block;}.q-feedback.ok{background:var(--correct-bg);border-color:var(--correct-bd);color:var(--correct);}.q-feedback.bad{background:var(--wrong-bg);border-color:var(--wrong-bd);color:var(--wrong);}
  .submit-row{display:flex;justify-content:flex-end;margin-top:1rem;}
  .btn-check{padding:0.55em 1.5em;border-radius:8px;border:none;background:var(--accent);color:#000;font-weight:700;font-size:0.85rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
  .results{display:none;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:2rem;text-align:center;margin-top:2rem;}
  .results.show{display:block;}.res-score{font-size:3rem;font-weight:800;color:var(--accent);line-height:1;}
  .res-label{color:var(--muted);font-size:0.9rem;margin-top:0.4rem;margin-bottom:1.5rem;}
  .btn-reset{padding:0.6em 1.8em;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-weight:600;font-size:0.85rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
  .btn-reset:hover{border-color:var(--accent);color:var(--accent);}
  .hidden{display:none;}
</style>

<script>
const cards = [{"q": "What is matter? How does it differ from energy?", "a": "Matter has mass and takes up space (e.g. stone, air). Energy does not have mass or take up space (e.g. light, sound, motion).", "hint": ""}, {"q": "What is the difference between extensive and intensive physical properties?", "a": "Extensive properties change with amount (mass, volume). Intensive properties do not change with amount (density, colour, melting point, solubility). Intensive properties are useful for identifying substances.", "hint": ""}, {"q": "Define solubility and give an example with units.", "a": "The amount of solute that can dissolve in a given solvent at a given temperature. E.g. sugar: 200 g/dL at 25\u00b0C.", "hint": ""}, {"q": "What is thermal conductivity? Distinguish conductors from insulators.", "a": "The ability of a material to transmit heat by conduction (particle collisions transferring kinetic energy). Conductors transfer heat rapidly (metals); insulators transfer heat slowly. A vacuum conducts no heat.", "hint": ""}, {"q": "What is electrical conductivity? What types of materials are good conductors?", "a": "The ability to carry electricity via moving charged particles. Good conductors: metals (delocalised electrons) and ionic solutions (free-moving ions). Insulators: gases, glass, rubber, plastic, dry wood.", "hint": ""}, {"q": "What are high-resistance conductors? Give an example.", "a": "Materials that conduct electricity but generate heat due to particle resistance. Used in heating elements. Example: nichrome (nickel-chromium alloy) in electric ovens.", "hint": ""}, {"q": "Define melting point and boiling point. What is true of freezing point vs melting point?", "a": "Melting point: temperature at which solid becomes liquid (particles break from rigid lattice). Boiling point: temperature at which liquid becomes gas (particles overcome attractive forces). Freezing point = melting point exactly.", "hint": ""}, {"q": "What is a nanomaterial? What is its defining physical feature?", "a": "A material with particles 1-100 nm in size. Defining feature: enormous surface area to volume ratio, enabling more efficient catalysis and unique properties unlike bulk forms.", "hint": "1-100 nm"}, {"q": "Why do gold nanoparticles look different colours compared to bulk gold?", "a": "Bulk gold is yellow and non-reactive. Nanoparticles appear red, green, or purple depending on their specific size because at the nanoscale, the number and arrangement of individual atoms affects properties.", "hint": ""}, {"q": "How were lipid nanoparticles used in COVID-19 mRNA vaccines?", "a": "They acted as envelopes to deliver mRNA into cells. Without them, the unstable mRNA would break down too quickly to initiate an immune response.", "hint": ""}, {"q": "Distinguish between a pure substance, a homogeneous mixture, and a heterogeneous mixture.", "a": "Pure substance: one type of particle (element or compound). Homogeneous mixture: thoroughly mixed, same composition at molecular level (e.g. saltwater). Heterogeneous mixture: incompletely mixed, different parts distinguishable (e.g. soil, blood).", "hint": ""}, {"q": "How does filtration work and what types of mixtures does it separate?", "a": "Filtration separates heterogeneous mixtures with solid particles in liquid. Filter paper allows liquid molecules through but blocks larger solid grains. Both components can be recovered.", "hint": ""}, {"q": "How does simple distillation work? When is fractional distillation used instead?", "a": "Simple distillation: heat vaporises the lowest boiling-point component, vapour cools in condenser into distillate. Used when boiling points are very different. Fractional distillation uses a fractionating column for liquids with similar boiling points (e.g. crude oil).", "hint": ""}, {"q": "What are the three subatomic particles, their charges, masses and locations?", "a": "Proton: +1 charge, 1 amu, in nucleus. Neutron: 0 charge, 1 amu, in nucleus. Electron: -1 charge, ~1/1800 amu, in shells around nucleus.", "hint": ""}, {"q": "What is the atomic number and mass number of an atom?", "a": "Atomic number (Z) = number of protons (defines the element). Mass number (A) = protons + neutrons. Number of neutrons = A - Z.", "hint": ""}, {"q": "What is the electron capacity formula for each shell? Give the capacity of the first four shells.", "a": "Capacity = 2n^2 where n = shell number. Shell 1: 2, Shell 2: 8, Shell 3: 18, Shell 4: 32.", "hint": ""}, {"q": "What is the main-shell electron configuration of sodium (Z=11)?", "a": "Sodium has 11 electrons: 2 in shell 1, 8 in shell 2, 1 in shell 3. Configuration: 2,8,1.", "hint": ""}, {"q": "Explain atomic absorption. Why can only specific energies be absorbed?", "a": "An electron absorbs a photon and jumps to a higher energy shell. Only photons with EXACTLY the right energy (matching the gap between energy levels) can be absorbed. Energy levels are fixed and discrete - no partial absorption.", "hint": ""}, {"q": "What is an absorption spectrum? What do the dark lines represent?", "a": "When white light passes through elemental gas, specific wavelengths are absorbed (electrons promoted). The transmitted light shows dark lines at those wavelengths. The pattern is unique to each element and can identify it.", "hint": ""}, {"q": "How does an emission spectrum differ from an absorption spectrum?", "a": "Excited electrons return to ground state and emit photons. The emission spectrum shows bright coloured lines on a dark background. The wavelengths are IDENTICAL to the absorption spectrum for the same element.", "hint": ""}, {"q": "What is the relationship between photon energy and wavelength?", "a": "Photon energy is inversely proportional to wavelength. Short wavelength = high energy (violet, ~3.1 eV, ~400 nm). Long wavelength = low energy (red, ~1.8 eV, ~700 nm).", "hint": ""}, {"q": "What are isotopes? How do they differ in chemistry vs physics?", "a": "Isotopes are versions of an element with the same number of protons (same Z) but different numbers of neutrons (different A). They have IDENTICAL chemical properties (same electrons) but different masses and physical properties.", "hint": ""}, {"q": "Write the composite symbol for an atom and identify each component.", "a": "A over Z, then X. A = mass number (protons + neutrons, top left). Z = atomic number (protons, bottom left). X = elemental symbol.", "hint": ""}, {"q": "What is the fill order for electron subshells? Name the subshells in order.", "a": "1s, 2s, 2p, 3s, 3p, 4s, 3d, 4p, 5s, 4d, 5p, 6s, 4f, 5d... Note: 4s fills BEFORE 3d because it is lower in energy.", "hint": ""}, {"q": "What are the electron capacities of s, p, d, and f subshells?", "a": "s: 2 electrons. p: 6 electrons. d: 10 electrons. f: 14 electrons.", "hint": ""}, {"q": "Why does chromium have the configuration 4s1 3d5 instead of 4s2 3d4?", "a": "A half-filled d subshell (d5) is especially stable due to symmetry. The energy benefit of achieving d5 symmetry exceeds the energy cost of moving one electron from 4s to 3d.", "hint": "Half-filled d is stable"}, {"q": "When transition metal atoms form ions, which electrons are lost first?", "a": "Transition metals lose electrons from the ns subshell BEFORE the (n-1)d subshell. E.g., Ni loses 4s electrons first to form Ni2+, keeping 3d8.", "hint": "ns before (n-1)d"}, {"q": "What is a mole? What is Avogadro's number?", "a": "A mole is the amount of substance containing 6.02 x 10^23 particles. Named Avogadro's number (NA). Based on the number of atoms in exactly 12.00 g of carbon-12.", "hint": "6.02 x 10^23"}, {"q": "State the mole equation and define each variable with units.", "a": "n = m/M. n = number of moles (mol). m = mass (g). M = molar mass (g/mol). Can be rearranged: m = nM and M = m/n.", "hint": ""}, {"q": "How is molar mass calculated for a compound? Give an example for CO2.", "a": "Add the molar masses of all atoms in the formula. M(CO2) = 12.01 + 2(16.00) = 44.01 g/mol. The periodic table gives molar mass for each element.", "hint": ""}, {"q": "What is relative atomic mass (Ar) and why does it differ from mass number?", "a": "Ar is a weighted average of all isotope masses, weighted by natural abundance on Earth. It differs from mass number (always a whole number) because it accounts for the mix of isotopes. E.g., Ar(Br) = 79.91.", "hint": "Weighted average of isotopes"}, {"q": "What is the difference between molar mass (M) and relative molecular mass (Mr)?", "a": "Both calculated the same way (sum of atomic masses). Molar mass is the mass of one mole and has UNITS of g/mol. Relative molecular mass is compared to carbon-12 and is DIMENSIONLESS (no units).", "hint": ""}, {"q": "How do you determine the period of an element from its electron configuration?", "a": "The period equals the highest main shell number in the electron configuration. E.g., phosphorus 1s2 2s2 2p6 3s2 3p3 has highest shell = 3, so it is in Period 3.", "hint": ""}, {"q": "How do you determine the group of a main-group element?", "a": "For main group elements, the group number (I-VIII) equals the number of electrons in the outermost shell. E.g., phosphorus main-shell 2,8,5 has 5 outer electrons = Main Group V.", "hint": ""}, {"q": "Describe the trend in atomic radius across a period and down a group.", "a": "Across a period (left to right): radius DECREASES - same shell, but more protons attract electrons closer. Down a group: radius INCREASES - electrons in higher shells, further from nucleus.", "hint": ""}, {"q": "Describe the trend in electronegativity. What is the most electronegative element?", "a": "Across a period (left to right): increases (smaller radius, stronger attraction). Down a group: decreases (larger radius + more shielding). Most electronegative: Fluorine (4.0 on Pauling scale). Lowest: Cs/Fr (0.7).", "hint": "F = 4.0"}, {"q": "What are the four blocks of the periodic table and what subshell do they correspond to?", "a": "s-block (Groups I-II): highest subshell is s. p-block (Groups XIII-XVIII): highest subshell is p. d-block (Groups III-XII): highest subshell is d. f-block (lanthanides and actinides): highest subshell is f.", "hint": ""}, {"q":"Balance: 2H2 + O2 → ? Then find particles in 3 mol H2O.","a":"2H2 + O2 → 2H2O. 3 mol H2O = 1.806×10^24 molecules.","hint":"Use Avogadro number"}, {"q":"Balance: N2 + H2 → NH3. How many H2 molecules for 10 molecules N2?","a":"N2 + 3H2 → 2NH3. Need 30 H2 molecules.","hint":"Use mole ratios"}, {"q":"Balance: Fe + O2 → Fe2O3. Find molar mass Fe2O3.","a":"4Fe + 3O2 → 2Fe2O3. Molar mass = 159.7 g/mol.","hint":"Fe=55.85 O=16"}];
const mcqs = [{"q": "Which of the following is an INTENSIVE physical property?", "opts": ["Mass", "Volume", "Density", "Number of particles"], "ans": 2, "exp": "Density does not change when the amount of substance changes \u2014 it is intensive. Mass, volume and number of particles are extensive (they change proportionally with amount)."}, {"q": "Pure water does NOT conduct electricity because:", "opts": ["It is too cold", "It contains no free charged particles", "It is a compound", "It has a low boiling point"], "ans": 1, "exp": "Pure water has no free-moving charged particles. Electrical conductivity requires charged particles that can move. Ionic solutions conduct because dissolved ions are free to move."}, {"q": "Which separation technique would you use to separate salt from saltwater?", "opts": ["Filtration", "Simple distillation", "Evaporation", "Fractional distillation"], "ans": 2, "exp": "Evaporation heats the saltwater above the boiling point of water. The water evaporates, leaving the salt (solute) behind in the evaporating dish. Filtration is for solids in liquids."}, {"q": "What is the mass number of an atom?", "opts": ["Number of protons only", "Number of neutrons only", "Number of protons plus neutrons", "Number of protons plus electrons"], "ans": 2, "exp": "Mass number (A) = protons + neutrons. Electrons are ignored because their mass (~1/1800 amu) is negligible compared to protons and neutrons."}, {"q": "A neutral sodium atom (Z=11) has how many electrons?", "opts": ["8", "10", "11", "12"], "ans": 2, "exp": "Neutral atoms have equal numbers of protons and electrons. Z=11 means 11 protons, so sodium has 11 electrons. Its main-shell configuration is 2,8,1."}, {"q": "The electron capacity of the 3rd shell is:", "opts": ["2", "8", "18", "32"], "ans": 2, "exp": "Shell capacity = 2n^2. For n=3: 2(3)^2 = 2x9 = 18 electrons. Shells 1,2,3,4 have capacities 2,8,18,32 respectively."}, {"q": "Atomic absorption occurs when an electron:", "opts": ["Falls to a lower energy shell and emits a photon", "Jumps to a higher energy shell by absorbing a photon", "Is removed from the atom entirely", "Gains mass from the nucleus"], "ans": 1, "exp": "Atomic absorption: an electron absorbs a photon of exactly the right energy and jumps to a higher energy shell (excited state). This removes that wavelength from the transmitted light."}, {"q": "Why are the dark lines in an absorption spectrum unique to each element?", "opts": ["Each element has different coloured electrons", "Each element has unique energy gaps between electron shells", "Each element absorbs all wavelengths differently", "Elements in stars are different from Earth elements"], "ans": 1, "exp": "The energy gaps between electron shells are unique for each element. Since only photons matching those exact energy gaps are absorbed, the pattern of dark lines is characteristic and unique to each element."}, {"q": "Isotopes of the same element have:", "opts": ["Different numbers of protons", "Different numbers of electrons", "Different numbers of neutrons", "Different chemical properties"], "ans": 2, "exp": "Isotopes of the same element have the same number of protons (same Z, same element) and the same number of electrons, but DIFFERENT numbers of neutrons. Chemical properties are identical because chemistry depends on electrons."}, {"q": "In subshell notation, the 4s subshell fills BEFORE the 3d subshell because:", "opts": ["4s has more electrons", "4s is lower in energy than 3d", "4s is in a higher main shell", "The s subshell always fills before d"], "ans": 1, "exp": "Subshells fill from lowest energy first. Due to energy level overlap between the 3rd and 4th main shells, the 4s subshell is lower in energy than 3d and therefore fills first."}, {"q": "What is Avogadro's number?", "opts": ["6.02 x 10^20", "6.02 x 10^23", "6.02 x 10^26", "1.66 x 10^-24"], "ans": 1, "exp": "Avogadro's number NA = 6.02 x 10^23. This is the number of particles in one mole of any substance. It is based on the number of atoms in exactly 12.00 g of carbon-12."}, {"q": "Calculate the molar mass of water (H2O). (H = 1.01, O = 16.00)", "opts": ["17.01 g/mol", "18.02 g/mol", "16.00 g/mol", "32.02 g/mol"], "ans": 1, "exp": "M(H2O) = 2(1.01) + 1(16.00) = 2.02 + 16.00 = 18.02 g/mol. Always multiply each element's molar mass by how many atoms are in the formula."}, {"q": "5.00 g of calcium (M = 40.08 g/mol) contains how many moles?", "opts": ["0.0800 mol", "0.125 mol", "200 mol", "8.00 mol"], "ans": 1, "exp": "n = m/M = 5.00/40.08 = 0.125 mol. The mole equation n = m/M converts grams to moles using the molar mass as a conversion factor."}, {"q": "Atomic radius DECREASES as you move:", "opts": ["Down a group", "Across a period from left to right", "From non-metals to metals", "From p-block to s-block"], "ans": 1, "exp": "Moving left to right across a period: more protons are added to the nucleus but electrons remain in the same main shell. The increased nuclear charge attracts all electrons more strongly, pulling them closer and decreasing radius."}, {"q": "Which element has the highest electronegativity?", "opts": ["Oxygen", "Chlorine", "Caesium", "Fluorine"], "ans": 3, "exp": "Fluorine has the highest electronegativity of 4.0 on the Pauling scale. It is in the top-right of the periodic table (excluding noble gases), where electronegativity is highest."}, {"q": "The d-block elements are also known as:", "opts": ["Alkali metals", "Noble gases", "Transition metals", "Halogens"], "ans": 2, "exp": "The d-block (Groups III-XII) contains elements whose highest energy electrons are in d subshells. These are called transition metals. Examples include iron, copper, nickel and zinc."}, {"q": "Relative atomic mass (Ar) differs from mass number because:", "opts": ["It includes the mass of electrons", "It is a weighted average of all isotope masses based on natural abundance", "It uses different units", "It only counts protons"], "ans": 1, "exp": "Mass number is always a whole number (protons + neutrons for one isotope). Relative atomic mass is a weighted average of ALL isotopes of the element, accounting for their relative abundance on Earth."}, {"q": "When a transition metal forms a cation, electrons are removed from:", "opts": ["The 3d subshell first", "The 4s subshell first", "The 4p subshell first", "The innermost shell first"], "ans": 1, "exp": "Transition metals lose electrons from the ns subshell BEFORE the (n-1)d subshell. Despite 4s filling before 3d, electrons are lost from 4s first when ions form. E.g., Fe2+ loses both 4s electrons, keeping 3d6."}, {"q": "Fractional distillation differs from simple distillation because it:", "opts": ["Uses lower temperatures", "Uses a fractionating column to separate liquids with similar boiling points", "Does not require heat", "Only works with gases"], "ans": 1, "exp": "Fractional distillation uses a fractionating column with increased internal surface area. This allows much greater control over the process and can separate liquids with similar boiling points (e.g. crude oil components)."}, {"q": "What type of mixture is blood?", "opts": ["Homogeneous \u2014 same composition throughout", "Heterogeneous \u2014 different cells make it non-uniform at molecular level", "A pure substance \u2014 it always has the same formula", "An element \u2014 it contains only carbon and oxygen"], "ans": 1, "exp": "Blood appears uniform to the naked eye but contains different types of cells (red blood cells, white blood cells, platelets) with different compositions. Since it is not uniform at the molecular level, it is a heterogeneous mixture."}, {q:"Which THREE are chemical properties?",opts:["Reactivity, acidity, combustion","Melting point, colour, density","Mass, volume, temperature","Boiling point, hardness, density"],ans:0}, {q:"Which THREE are physical properties?",opts:["Melting point, colour, density","Combustion, oxidation, reactivity","Acidity, flammability, corrosion","Reactivity, oxidation, boiling"],ans:0}, {q:"Why are high‑resistance conductors used in heaters?",opts:["They stop electricity","They convert electrical energy to heat","They melt easily","They are insulators"],ans:1}, {q:"Which subshell holds max 10 electrons?",opts:["s","p","d","f"],ans:2}, {q:"Which subshell holds max 14 electrons?",opts:["s","p","d","f"],ans:3}, {q:"What causes emission spectra?",opts:["Electrons falling to lower energy levels","Electrons removed","Protons moving","Neutrons splitting"],ans:0}, {q:"Atomic notation for carbon‑14?",opts:["14C6","6C14","C146","14/6 C"],ans:0}, {q:"Atomic radius across a period?",opts:["Increase","Decrease","Same","Random"],ans:1}, {q:"Electronegativity down a group?",opts:["Increase","Decrease","Same","Random"],ans:1}, {q:"Group II ionic charge?",opts:["+1","+2","-1","-2"],ans:1}, {q:"Why is filtration used?",opts:["Separate insoluble solid from liquid","Separate liquids","Separate gases","Measure density"],ans:0}, {q:"Why use fractional distillation?",opts:["Separate liquids with similar boiling points","Remove solids","Remove gases","Cool liquids"],ans:0}, {q:"Metallic character increases where?",opts:["Down group","Across period","Up group","Right side"],ans:0}];
let fcIdx=0,fcKnown=new Set(),answered=new Array(mcqs.length).fill(null),correct=0;
function setMode(m){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));event.target.classList.add('on');document.getElementById('flashMode').classList.toggle('hidden',m!=='flash');document.getElementById('mcqMode').classList.toggle('hidden',m!=='mcq');if(m==='mcq')buildMCQ();}
function showCard(){const c=cards[fcIdx];document.getElementById('fcQ').textContent=c.q;document.getElementById('fcA').textContent=c.a;document.getElementById('fcHint').textContent=c.hint?'Hint: '+c.hint:'';document.getElementById('fcLabel').textContent='Card '+(fcIdx+1)+' of '+cards.length;document.getElementById('fcProg').style.width=(((fcIdx+1)/cards.length)*100)+'%';document.getElementById('fcCount').textContent=fcKnown.size+' known';document.getElementById('fc').classList.remove('flipped');}
function flipCard(){document.getElementById('fc').classList.toggle('flipped');}
function nextCard(){if(fcIdx<cards.length-1){fcIdx++;showCard();}}
function prevCard(){if(fcIdx>0){fcIdx--;showCard();}}
function markCard(k){if(k)fcKnown.add(fcIdx);else fcKnown.delete(fcIdx);nextCard();}
function buildMCQ(){const c=document.getElementById('mcqQuestions');if(c.children.length>0)return;mcqs.forEach(function(q,qi){const d=document.createElement('div');d.className='q-card';const optsHtml=q.opts.map(function(o,oi){return '<div class="opt" id="opt'+qi+'_'+oi+'" onclick="choose('+qi+','+oi+')"><span class="opt-letter">'+['A','B','C','D'][oi]+'</span><span>'+o+'</span></div>';}).join('');d.innerHTML='<div class="q-num">Question '+(qi+1)+' of '+mcqs.length+'</div><div class="q-text">'+q.q+'</div><div class="opts" id="opts'+qi+'">'+optsHtml+'</div><div class="q-feedback" id="fb'+qi+'"></div>';c.appendChild(d);});}
function choose(qi,oi){if(answered[qi]!==null)return;document.querySelectorAll('#opts'+qi+' .opt').forEach(function(o){o.classList.remove('chosen');});document.getElementById('opt'+qi+'_'+oi).classList.add('chosen');answered[qi]=oi;}
function submitQuiz(){correct=0;mcqs.forEach(function(q,qi){const sel=answered[qi];if(sel===null)return;const opts=document.querySelectorAll('#opts'+qi+' .opt');opts.forEach(function(o){o.classList.add('locked');});opts[q.ans].classList.add('correct');const fb=document.getElementById('fb'+qi);if(sel===q.ans){correct++;fb.className='q-feedback show ok';fb.textContent='Correct! '+q.exp;}else{opts[sel].classList.add('wrong');fb.className='q-feedback show bad';fb.textContent='Incorrect. '+q.exp;}});document.getElementById('scoreDisp').textContent=correct+' / '+mcqs.length;const res=document.getElementById('results');res.classList.add('show');document.getElementById('resScore').textContent=correct+' / '+mcqs.length;const pct=Math.round((correct/mcqs.length)*100);document.getElementById('resLabel').textContent=pct>=80?'Excellent work!':pct>=60?'Good effort - review the ones you missed.':'Keep studying - you will get there!';res.scrollIntoView({behavior:'smooth'});}
function resetQuiz(){answered=new Array(mcqs.length).fill(null);correct=0;document.getElementById('mcqQuestions').innerHTML='';document.getElementById('results').classList.remove('show');document.getElementById('scoreDisp').textContent='0 / 0';buildMCQ();}
showCard();
</script>
